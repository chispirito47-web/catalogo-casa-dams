<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Casa DAMS · Catálogo de Mobiliario</title>
  <meta name="description" content="Catálogo de muebles Casa DAMS — Mobiliario contemporáneo para el hogar." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,opsz,wght@0,6..96,400;0,6..96,600;1,6..96,400;1,6..96,600&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
:root {
  --paper:#EAE2D6;--paper-2:#E3DACD;--card:#FBF8F2;--card-soft:#F4EEE4;
  --ink:#2A251F;--ink-2:#5A5145;--ink-3:#908676;
  --line:rgba(42,37,31,.14);--line-soft:rgba(42,37,31,.08);
  --wood:#8A6E54;--wood-deep:#6A5240;
  --st-almacen:#5E7355;--st-pedido:#9A7B4F;--st-descont:#A05A4E;
  --display:"Bodoni Moda",Georgia,serif;
  --serif:"Cormorant Garamond",Georgia,serif;
  --sans:"Jost","Helvetica Neue",Arial,sans-serif;
  --shadow-card:0 1px 2px rgba(42,37,31,.04),0 18px 40px -24px rgba(42,37,31,.28);
  --shadow-lift:0 2px 6px rgba(42,37,31,.06),0 36px 60px -30px rgba(42,37,31,.40);
  --ease:cubic-bezier(.22,.61,.36,1);
}
*{box-sizing:border-box;}html,body{margin:0;padding:0;}
body{background:var(--paper);color:var(--ink);font-family:var(--sans);-webkit-font-smoothing:antialiased;}
::selection{background:var(--wood);color:#fff;}
*::-webkit-scrollbar{width:10px;height:10px;}
*::-webkit-scrollbar-thumb{background:rgba(42,37,31,.18);border-radius:10px;border:3px solid transparent;background-clip:content-box;}
*::-webkit-scrollbar-thumb:hover{background:rgba(42,37,31,.30);background-clip:content-box;}
.kicker{font-family:var(--sans);font-weight:400;text-transform:uppercase;letter-spacing:.34em;font-size:11px;color:var(--ink-3);}
.app{min-height:100vh;}
.topbar{position:sticky;top:0;z-index:50;display:flex;align-items:center;justify-content:space-between;padding:16px clamp(18px,4vw,56px);background:color-mix(in srgb,var(--paper) 82%,transparent);backdrop-filter:blur(14px) saturate(1.1);-webkit-backdrop-filter:blur(14px) saturate(1.1);border-bottom:1px solid var(--line-soft);transition:background .4s var(--ease);}
.brand{display:flex;align-items:center;gap:11px;cursor:pointer;user-select:none;}
.brand-logo{width:38px;height:38px;border-radius:50%;overflow:hidden;flex-shrink:0;border:1px solid var(--line);box-shadow:0 4px 12px -6px rgba(42,37,31,.4);}
.brand-logo img{width:100%;height:100%;object-fit:cover;display:block;}
.brand .mark{font-family:var(--display);font-weight:600;font-size:22px;letter-spacing:.01em;}
.brand .mark em{font-style:italic;}
.brand .sub{font-family:var(--sans);text-transform:uppercase;letter-spacing:.3em;font-size:9.5px;color:var(--ink-3);}
.top-nav{display:flex;align-items:center;gap:clamp(10px,2.4vw,30px);}
.top-link{background:none;border:none;cursor:pointer;font-family:var(--sans);font-size:12px;text-transform:uppercase;letter-spacing:.22em;color:var(--ink-2);padding:6px 0;position:relative;transition:color .3s var(--ease);}
.top-link::after{content:"";position:absolute;left:0;bottom:0;height:1px;width:0;background:var(--ink);transition:width .35s var(--ease);}
.top-link:hover{color:var(--ink);}
.top-link:hover::after,.top-link.active::after{width:100%;}
.top-link.active{color:var(--ink);}
.admin-toggle{display:inline-flex;align-items:center;gap:8px;font-family:var(--sans);font-size:11px;letter-spacing:.18em;text-transform:uppercase;padding:9px 16px;border-radius:999px;cursor:pointer;border:1px solid var(--line);background:transparent;color:var(--ink-2);transition:all .3s var(--ease);}
.admin-toggle:hover{border-color:var(--ink);color:var(--ink);}
.admin-toggle.on{background:var(--ink);color:var(--paper);border-color:var(--ink);}
.admin-toggle svg{width:13px;height:13px;}
/* MODAL DE AUTENTICACIÓN ADMIN */
.auth-overlay{position:fixed;inset:0;z-index:600;background:rgba(20,16,12,.78);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);display:flex;align-items:center;justify-content:center;animation:fadeIn .25s var(--ease);}
.auth-box{background:var(--card);border-radius:20px;padding:40px 36px;width:min(400px,92vw);box-shadow:var(--shadow-lift);display:flex;flex-direction:column;gap:0;position:relative;}
.auth-box-logo{width:52px;height:52px;border-radius:50%;overflow:hidden;border:1px solid var(--line);margin:0 auto 18px;box-shadow:0 6px 18px -8px rgba(42,37,31,.5);}
.auth-box-logo img{width:100%;height:100%;object-fit:cover;display:block;}
.auth-box h2{font-family:var(--display);font-size:24px;font-style:italic;font-weight:400;text-align:center;margin:0 0 4px;}
.auth-box p{font-family:var(--sans);font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--ink-3);text-align:center;margin:0 0 28px;}
.auth-field{position:relative;margin-bottom:14px;}
.auth-field input{width:100%;font-family:var(--sans);font-size:15px;color:var(--ink);background:var(--paper);border:1px solid var(--line);border-radius:10px;padding:13px 48px 13px 16px;outline:none;transition:border-color .2s var(--ease);box-sizing:border-box;}
.auth-field input:focus{border-color:var(--wood);}
.auth-field input.error{border-color:var(--st-descont);}
.auth-eye{position:absolute;right:14px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--ink-3);padding:4px;display:inline-flex;transition:color .2s;}
.auth-eye:hover{color:var(--ink);}
.auth-eye svg{width:18px;height:18px;}
.auth-err{font-family:var(--sans);font-size:11px;color:var(--st-descont);letter-spacing:.08em;margin:-6px 0 10px;display:flex;align-items:center;gap:6px;}
.auth-btn{width:100%;padding:14px;font-family:var(--sans);font-size:12px;letter-spacing:.2em;text-transform:uppercase;background:var(--ink);color:var(--paper);border:none;border-radius:999px;cursor:pointer;transition:all .3s var(--ease);margin-top:4px;}
.auth-btn:hover{transform:translateY(-2px);box-shadow:0 8px 24px -10px rgba(42,37,31,.55);}
.auth-close{position:absolute;top:14px;right:14px;background:none;border:none;cursor:pointer;color:var(--ink-3);padding:6px;border-radius:6px;display:inline-flex;transition:color .2s;}
.auth-close:hover{color:var(--ink);}
.auth-close svg{width:18px;height:18px;}
.ph{position:relative;overflow:hidden;background-color:var(--card-soft);background-image:repeating-linear-gradient(-45deg,rgba(138,110,84,.06) 0 12px,rgba(138,110,84,.0) 12px 24px);display:flex;align-items:center;justify-content:center;}
.ph::after{content:'';position:absolute;inset:0;background:linear-gradient(90deg,transparent 0%,rgba(255,255,255,.18) 50%,transparent 100%);background-size:200% 100%;animation:shimmer 1.6s infinite;pointer-events:none;}
.ph.has-img::after{display:none;}
.ph img{transition:opacity .4s ease;opacity:0;}
.ph.loaded img,.ph img.loaded{opacity:1;}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
.ph::after{content:attr(data-label);font-family:var(--sans);font-size:10px;letter-spacing:.24em;text-transform:uppercase;color:var(--ink-3);padding:6px 12px;border:1px solid var(--line);border-radius:999px;background:color-mix(in srgb,var(--card) 70%,transparent);}
.ph img{width:100%;height:100%;object-fit:cover;display:block;}
.ph .ph-bg{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;filter:blur(22px) saturate(1.08) brightness(1.02);transform:scale(1.15);opacity:1 !important;transition:none;}
.ph img.ph-fg{position:relative;z-index:1;object-fit:contain;}
.ph.has-img::after{display:none;}
.btn{font-family:var(--sans);cursor:pointer;text-transform:uppercase;letter-spacing:.2em;font-size:12px;padding:14px 28px;border-radius:999px;border:1px solid var(--ink);background:var(--ink);color:var(--paper);transition:all .3s var(--ease);display:inline-flex;align-items:center;gap:10px;}
.btn:hover{transform:translateY(-2px);box-shadow:var(--shadow-card);}
.btn.ghost{background:transparent;color:var(--ink);}
.btn.ghost:hover{background:var(--ink);color:var(--paper);}
.btn.small{padding:9px 16px;font-size:10.5px;letter-spacing:.16em;}
.icon-btn{background:none;border:none;cursor:pointer;padding:6px;color:var(--ink-2);display:inline-flex;border-radius:6px;transition:all .2s var(--ease);}
.icon-btn:hover{color:var(--ink);background:var(--card-soft);}
.icon-btn svg{width:18px;height:18px;}
.icon-btn.danger:hover{color:var(--st-descont);}
.badge{display:inline-flex;align-items:center;gap:7px;font-family:var(--sans);font-size:10px;letter-spacing:.16em;text-transform:uppercase;padding:5px 11px;border-radius:999px;background:color-mix(in srgb,var(--card) 60%,transparent);border:1px solid var(--line);color:var(--ink-2);}
.badge .dot{width:6px;height:6px;border-radius:50%;}
.badge.almacen .dot{background:var(--st-almacen);}
.badge.pedido .dot{background:var(--st-pedido);}
.badge.descont .dot{background:var(--st-descont);}
.finishes{display:flex;gap:8px;align-items:center;}
.finish-dot{width:26px;height:26px;border-radius:50%;border:1px solid var(--line);cursor:pointer;position:relative;transition:transform .25s var(--ease);padding:0;background-clip:padding-box;}
.finish-dot:hover{transform:scale(1.12);}
.finish-dot.sel{box-shadow:0 0 0 2px var(--paper),0 0 0 3px var(--ink);}
.finish-dot.mini{width:16px;height:16px;}
.reveal{transform:translateY(18px);opacity:0;}
.reveal.in{transform:none;opacity:1;transition:transform .7s var(--ease),opacity .6s var(--ease);}
@media(prefers-reduced-motion:reduce){.reveal{opacity:1;transform:none;}}
.view-enter{animation:viewIn .55s var(--ease) both;}
@keyframes viewIn{from{transform:translateY(16px);}to{transform:none;}}
.fade-in{animation:fadeIn .5s var(--ease) both;}
@keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
/* PORTADA */
.cover{display:grid;grid-template-columns:48px 1fr 48px;min-height:100vh;min-height:100svh;overflow:hidden;}
.cover-stage{position:relative;overflow:hidden;min-height:100vh;min-height:100svh;}
.cover-spine{writing-mode:vertical-rl;font-family:var(--sans);font-size:9px;letter-spacing:.3em;text-transform:uppercase;color:var(--ink-3);display:flex;align-items:center;justify-content:center;border-right:1px solid var(--line);}
.cover-spine:last-child{border-right:none;border-left:1px solid var(--line);}
.cover-hero{position:absolute;inset:0;}
.cover-hero .ph{width:100%;height:100%;background-color:#C5B49E;}
.cover-grad{position:absolute;inset:0;background:linear-gradient(to bottom,rgba(42,37,31,.18) 0%,rgba(42,37,31,.72) 100%);}
.cover-top{position:absolute;top:clamp(24px,5vh,56px);left:clamp(24px,5vw,64px);right:clamp(24px,5vw,64px);display:flex;gap:24px;}
.cover-top span{font-family:var(--sans);font-size:10px;letter-spacing:.32em;text-transform:uppercase;color:rgba(234,226,214,.65);}
.cover-title{position:absolute;top:50%;left:clamp(24px,5vw,64px);transform:translateY(-50%) translateY(-40px);font-family:var(--display);font-size:clamp(72px,14vw,200px);font-weight:600;font-style:italic;color:rgba(234,226,214,.12);letter-spacing:-.02em;line-height:1;margin:0;pointer-events:none;user-select:none;}
.cover-foot{position:absolute;bottom:0;left:0;right:0;padding:clamp(32px,6vh,72px) clamp(24px,5vw,64px);display:flex;align-items:flex-end;justify-content:space-between;gap:32px;}
.cover-headline{font-family:var(--display);font-size:clamp(28px,4vw,52px);color:var(--paper);margin:0 0 14px;line-height:1.15;font-weight:400;}
.cover-blurb{font-family:var(--serif);font-size:clamp(15px,1.4vw,18px);color:rgba(234,226,214,.75);line-height:1.7;margin:0 0 28px;max-width:440px;}
.barcode{display:flex;gap:3px;align-items:flex-end;height:44px;}
.barcode i{display:block;height:100%;background:rgba(234,226,214,.6);border-radius:1px;flex-shrink:0;}
/* VIDEO DE PORTADA */
.cover-video{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;display:block;background:#1d1813;transition:opacity .6s var(--ease);}
.cover-hero .ph{animation:coverDrift 26s ease-in-out infinite alternate;}
@keyframes coverDrift{from{transform:scale(1.04);}to{transform:scale(1.12) translateY(-1.5%);}}
.cover-grad{background:linear-gradient(to bottom,rgba(29,24,19,.34) 0%,rgba(29,24,19,.10) 34%,rgba(29,24,19,.55) 78%,rgba(29,24,19,.86) 100%);}
.cover-vignette{position:absolute;inset:0;pointer-events:none;box-shadow:inset 0 0 200px 40px rgba(20,16,12,.45);}
.cover-emblem{display:flex;align-items:center;gap:14px;}
.cover-emblem .emblem-ring{width:62px;height:62px;border-radius:50%;overflow:hidden;border:1px solid rgba(234,226,214,.4);box-shadow:0 10px 30px -10px rgba(0,0,0,.6);flex-shrink:0;background:#1d1813;}
.cover-emblem .emblem-ring img{width:100%;height:100%;object-fit:cover;display:block;}
.cover-emblem .emblem-txt{display:flex;flex-direction:column;gap:3px;}
.cover-emblem .emblem-txt .name{font-family:var(--display);font-size:20px;color:var(--paper);letter-spacing:.01em;line-height:1;}
.cover-emblem .emblem-txt .name em{font-style:italic;}
.cover-emblem .emblem-txt .yrs{font-family:var(--sans);font-size:9px;letter-spacing:.32em;text-transform:uppercase;color:rgba(234,226,214,.6);}
.cover-admin-edit{position:absolute;top:clamp(20px,4vh,40px);right:clamp(20px,5vw,56px);z-index:6;}
.cover-vbtn{display:inline-flex;align-items:center;gap:8px;font-family:var(--sans);font-size:11px;letter-spacing:.16em;text-transform:uppercase;padding:9px 16px;border-radius:999px;cursor:pointer;border:1px solid rgba(234,226,214,.45);background:rgba(29,24,19,.35);backdrop-filter:blur(8px);color:var(--paper);transition:all .3s var(--ease);}
.cover-vbtn:hover{background:rgba(29,24,19,.6);border-color:var(--paper);}
.cover-vbtn svg{width:14px;height:14px;}
.cover-vbtn input{display:none;}
.cover-uploading{display:inline-flex;align-items:center;gap:8px;color:var(--paper);font-family:var(--sans);font-size:11px;letter-spacing:.14em;}
/* WHATSAPP */
.wa-btn{font-family:var(--sans);cursor:pointer;text-transform:uppercase;letter-spacing:.18em;font-size:12px;padding:15px 26px;border-radius:999px;border:1px solid #1f7a52;background:linear-gradient(160deg,#1fa463,#157a4a);color:#fff;transition:all .3s var(--ease);display:inline-flex;align-items:center;gap:11px;text-decoration:none;box-shadow:0 12px 30px -14px rgba(21,122,74,.7);}
.wa-btn:hover{transform:translateY(-2px);box-shadow:0 18px 40px -16px rgba(21,122,74,.85);}
.wa-btn svg{width:19px;height:19px;flex-shrink:0;}
.wa-btn.block{width:100%;justify-content:center;}
.wa-float{position:fixed;right:clamp(16px,3vw,28px);bottom:clamp(16px,3vw,28px);z-index:120;width:58px;height:58px;border-radius:50%;background:linear-gradient(160deg,#25d366,#1aa553);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 14px 34px -10px rgba(21,122,74,.6);transition:transform .3s var(--ease),box-shadow .3s var(--ease);}
.wa-float:hover{transform:scale(1.07);box-shadow:0 18px 44px -10px rgba(21,122,74,.75);}
.wa-float svg{width:30px;height:30px;color:#fff;}
.wa-float::before{content:"";position:absolute;inset:0;border-radius:50%;border:2px solid rgba(37,211,102,.5);animation:waPulse 2.6s var(--ease) infinite;}
@keyframes waPulse{0%{transform:scale(1);opacity:.7;}70%{transform:scale(1.5);opacity:0;}100%{opacity:0;}}
@media(prefers-reduced-motion:reduce){.wa-float::before{animation:none;}.cover-hero .ph{animation:none;}}
/* POPUP DE CAPTACIÓN — aparece automático estilo boutique */
.lead-overlay{position:fixed;inset:0;z-index:500;background:rgba(20,16,12,.65);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);display:flex;align-items:center;justify-content:center;animation:fadeIn .35s var(--ease);padding:20px;}
@keyframes slideUp{from{transform:translateY(100%);}to{transform:translateY(0);}}
.lead-box{background:var(--card);border-radius:24px;width:min(420px,100%);box-shadow:var(--shadow-lift);display:flex;flex-direction:column;overflow:hidden;position:relative;}
.lead-box-hero{background:var(--ink);padding:32px 32px 28px;text-align:center;position:relative;}
.lead-box-hero::after{content:"";position:absolute;bottom:-1px;left:0;right:0;height:24px;background:var(--card);border-radius:24px 24px 0 0;}
.lead-box-hero .kicker{color:rgba(234,226,214,.5);margin-bottom:10px;}
.lead-box-discount{font-family:var(--display);font-size:52px;font-weight:600;font-style:italic;color:var(--paper);line-height:1;margin-bottom:4px;letter-spacing:-.01em;}
.lead-box-subtitle{font-family:var(--sans);font-size:12px;letter-spacing:.22em;text-transform:uppercase;color:rgba(234,226,214,.6);}
.lead-box-body{padding:28px 30px 30px;display:flex;flex-direction:column;gap:0;}
.lead-box-desc{font-family:var(--serif);font-size:16px;color:var(--ink-2);text-align:center;line-height:1.6;margin-bottom:22px;}
.lead-fields{display:flex;flex-direction:column;gap:10px;margin-bottom:14px;}
.lead-field input{font-family:var(--sans);font-size:14px;color:var(--ink);background:var(--paper);border:1px solid var(--line);border-radius:10px;padding:13px 16px;outline:none;transition:border-color .2s var(--ease);width:100%;}
.lead-field input:focus{border-color:var(--wood);}
.lead-field input::placeholder{color:var(--ink-3);}
.lead-privacy{display:flex;align-items:flex-start;gap:9px;margin-bottom:18px;}
.lead-privacy input[type=checkbox]{width:15px;height:15px;accent-color:var(--wood);cursor:pointer;flex-shrink:0;margin-top:2px;}
.lead-privacy span{font-family:var(--sans);font-size:10.5px;color:var(--ink-3);line-height:1.55;}
.lead-submit{width:100%;padding:15px;font-family:var(--sans);font-size:12px;letter-spacing:.2em;text-transform:uppercase;background:var(--ink);color:var(--paper);border:none;border-radius:999px;cursor:pointer;transition:all .3s var(--ease);margin-bottom:10px;}
.lead-submit:hover:not(:disabled){transform:translateY(-2px);box-shadow:0 8px 24px -10px rgba(42,37,31,.55);}
.lead-submit:disabled{opacity:.45;cursor:not-allowed;}
.lead-skip{width:100%;padding:12px;font-family:var(--sans);font-size:11px;letter-spacing:.16em;text-transform:uppercase;background:transparent;color:var(--ink-3);border:1px dashed var(--line);border-radius:999px;cursor:pointer;transition:all .25s var(--ease);}
.lead-skip:hover{color:var(--ink);border-color:var(--ink-3);}
.lead-close{position:absolute;top:12px;right:14px;background:rgba(234,226,214,.12);border:none;cursor:pointer;color:rgba(234,226,214,.6);padding:6px;border-radius:6px;display:inline-flex;transition:color .2s;z-index:2;}
.lead-close:hover{color:var(--paper);}
.lead-close svg{width:17px;height:17px;}
.lead-err{font-family:var(--sans);font-size:11px;color:var(--st-descont);letter-spacing:.08em;margin:-6px 0 8px;text-align:center;}
.lead-success-body{padding:40px 30px 36px;text-align:center;}
.lead-success-icon{font-size:44px;margin-bottom:16px;}
.lead-success-body h3{font-family:var(--display);font-size:28px;font-style:italic;font-weight:400;margin:0 0 10px;color:var(--ink);}
.lead-success-body p{font-family:var(--serif);font-size:16px;color:var(--ink-2);line-height:1.65;margin:0 0 26px;}
@media(max-width:600px){
  /* Bottom sheet en móvil */
  .lead-overlay{align-items:flex-end;justify-content:center;padding:0;}
  .lead-box{border-radius:20px 20px 0 0;width:100%;max-height:92dvh;overflow-y:auto;-webkit-overflow-scrolling:touch;animation:slideUp .38s var(--ease) both;}
  /* Handle visual de bottom sheet */
  .lead-box::before{content:"";display:block;width:38px;height:4px;border-radius:999px;background:rgba(234,226,214,.25);margin:10px auto 0;position:absolute;top:0;left:50%;transform:translateX(-50%);}
  /* Hero más compacto */
  .lead-box-hero{padding:28px 20px 18px;}
  .lead-box-discount{font-size:34px;line-height:1.05;}
  .lead-box-subtitle{font-size:10px;letter-spacing:.18em;}
  .lead-box-hero .kicker{font-size:9px;margin-bottom:6px;}
  /* Body más compacto */
  .lead-box-body{padding:18px 18px 28px;}
  .lead-box-desc{font-size:14px;margin-bottom:14px;}
  /* Campos más delgados */
  .lead-fields{gap:8px;margin-bottom:10px;}
  .lead-field input{padding:11px 14px;font-size:14px;}
  .lead-privacy{margin-bottom:12px;}
  .lead-privacy span{font-size:10px;}
  .lead-submit{padding:13px;font-size:11px;margin-bottom:8px;}
  .lead-skip{padding:10px;font-size:10px;}
}
/* PESTAÑA FIJA DE OFERTAS */
.lead-tab{position:fixed;right:0;top:50%;transform:translateY(-50%);z-index:119;background:var(--ink);color:var(--paper);border:none;cursor:pointer;padding:14px 10px;border-radius:8px 0 0 8px;display:flex;align-items:center;justify-content:center;box-shadow:-4px 0 18px rgba(42,37,31,.25);transition:background .25s var(--ease),transform .25s var(--ease);writing-mode:vertical-rl;text-orientation:mixed;}
.lead-tab:hover{background:var(--wood);transform:translateY(-50%) translateX(-2px);}
.lead-tab-txt{font-family:var(--sans);font-size:11px;letter-spacing:.26em;text-transform:uppercase;color:var(--paper);}
@media(max-width:600px){
  .lead-tab{padding:12px 8px;top:60%;}
  .lead-tab-txt{font-size:10px;letter-spacing:.2em;}
}
/* LIGHTBOX */
.lightbox{position:fixed;inset:0;height:100vh;height:100dvh;z-index:400;background:rgba(20,16,12,.92);backdrop-filter:blur(8px);display:flex;align-items:center;justify-content:center;padding:clamp(20px,5vw,70px);animation:fadeIn .35s var(--ease);cursor:zoom-out;}
.lightbox-inner{position:relative;max-width:min(1100px,92vw);max-height:88vh;max-height:88dvh;display:flex;flex-direction:column;align-items:center;gap:18px;cursor:default;animation:lbIn .5s var(--ease) both;}
@keyframes lbIn{from{transform:scale(.94);opacity:0;}to{transform:scale(1);opacity:1;}}
.lightbox-img{max-width:100%;max-height:78vh;max-height:78dvh;object-fit:contain;border-radius:8px;box-shadow:0 40px 90px -30px rgba(0,0,0,.8);}
.lightbox-cap{font-family:var(--display);font-size:20px;font-style:italic;color:var(--paper);letter-spacing:.01em;}
.lightbox-close{position:absolute;top:-14px;right:-14px;width:42px;height:42px;border-radius:50%;background:var(--paper);color:var(--ink);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 8px 24px rgba(0,0,0,.4);transition:transform .25s var(--ease);}
.lightbox-close:hover{transform:rotate(90deg) scale(1.05);}
.lightbox-close svg{width:20px;height:20px;}
.lightbox-nav{position:absolute;top:50%;transform:translateY(-50%);width:46px;height:46px;border-radius:50%;background:rgba(234,226,214,.14);border:1px solid rgba(234,226,214,.3);color:var(--paper);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .25s var(--ease);}
.lightbox-nav:hover{background:rgba(234,226,214,.28);}
.lightbox-nav svg{width:20px;height:20px;}
.lightbox-nav.prev{left:-66px;}.lightbox-nav.next{right:-66px;}
@media(max-width:720px){.lightbox-nav.prev{left:6px;}.lightbox-nav.next{right:6px;}.lightbox-close{top:-6px;right:-6px;}}
.detail-hero{cursor:zoom-in;position:relative;}
.detail-hero .zoom-hint{position:absolute;bottom:12px;right:12px;width:34px;height:34px;border-radius:50%;background:rgba(42,37,31,.55);backdrop-filter:blur(6px);display:flex;align-items:center;justify-content:center;color:var(--paper);opacity:0;transition:opacity .3s var(--ease);pointer-events:none;}
.detail-hero:hover .zoom-hint{opacity:1;}
.detail-hero .zoom-hint svg{width:16px;height:16px;}
.client-foot .wa-btn{margin-top:22px;}
/* CATÁLOGO */
.catalog{max-width:1600px;margin:0 auto;padding:clamp(24px,4vh,56px) clamp(12px,2vw,32px);}
.catalog-head{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:36px;gap:20px;flex-wrap:wrap;}
.catalog-head h1{font-family:var(--display);font-size:clamp(38px,6vw,80px);margin:6px 0 0;font-weight:400;line-height:1;}
.catalog-head h1 em{font-style:italic;}
.catalog-count{font-family:var(--sans);font-size:13px;color:var(--ink-3);letter-spacing:.08em;}
.toolbar{display:flex;align-items:center;justify-content:space-between;gap:16px;margin-bottom:32px;flex-wrap:wrap;}
.chips{display:flex;gap:8px;flex-wrap:wrap;}
.chip{font-family:var(--sans);font-size:11px;letter-spacing:.2em;text-transform:uppercase;padding:8px 16px;border-radius:999px;border:1px solid var(--line);background:transparent;color:var(--ink-2);cursor:pointer;transition:all .25s var(--ease);}
.chip:hover{border-color:var(--ink);color:var(--ink);}
.chip.on{background:var(--ink);color:var(--paper);border-color:var(--ink);}
.search{display:flex;align-items:center;gap:10px;padding:10px 16px;border:1px solid var(--line);border-radius:999px;background:var(--card);min-width:220px;}
.search svg{width:16px;height:16px;color:var(--ink-3);flex-shrink:0;}
.search input{border:none;background:none;font-family:var(--sans);font-size:13px;color:var(--ink);outline:none;width:100%;}
.search input::placeholder{color:var(--ink-3);}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:2px;}
.card{background:var(--paper);border-radius:0;overflow:hidden;cursor:pointer;transition:transform .25s var(--ease),box-shadow .25s var(--ease);}
.card:hover{transform:translateY(-2px);box-shadow:0 8px 24px -10px rgba(42,37,31,.22);}
.card.hidden-item{opacity:.35;}
.card.selected{box-shadow:0 0 0 3px var(--wood) inset, 0 8px 28px -10px rgba(138,110,84,.4);}
.card.selecting:not(.selected){opacity:1;}
.card-media{position:relative;aspect-ratio:3/4;overflow:hidden;}
.card-media .ph{position:absolute;inset:0;width:100%;height:100%;}
.card-media .ph img{width:100%;height:100%;object-fit:cover;display:block;}
.card-media .ph img.ph-fg{object-fit:contain;}
.card-tag{position:absolute;top:14px;left:14px;}
.card-tag .badge{background:rgba(42,37,31,.92);border:none;color:#fff;font-weight:500;box-shadow:0 2px 8px rgba(0,0,0,.18);}
.card-fav{position:absolute;bottom:12px;right:12px;}
.card-select{position:absolute;top:10px;right:10px;width:32px;height:32px;border-radius:50%;background:rgba(255,255,255,.95);border:2px solid rgba(42,37,31,.25);display:flex;align-items:center;justify-content:center;color:var(--ink);box-shadow:0 2px 8px rgba(0,0,0,.18);transition:all .2s var(--ease);}
.card-select.on{background:var(--wood);border-color:var(--wood);color:#fff;transform:scale(1.1);box-shadow:0 4px 14px rgba(138,110,84,.45);}
.card-select svg{width:15px;height:15px;}
.card-admin{position:absolute;top:10px;right:10px;display:flex;gap:4px;background:color-mix(in srgb,var(--card) 85%,transparent);backdrop-filter:blur(8px);border-radius:8px;padding:4px;}
.card-body{padding:14px 4px 20px;display:flex;flex-direction:column;min-width:0;}
.card-cat{font-family:var(--sans);font-size:10px;letter-spacing:.24em;text-transform:uppercase;color:var(--ink-3);}
.card-name{font-family:var(--display);font-size:20px;margin:4px 0 6px;font-weight:400;font-style:italic;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;line-height:1.22;min-height:calc(1.22em * 2);overflow-wrap:break-word;word-break:break-word;}
.card-meta{display:flex;justify-content:space-between;align-items:baseline;margin-top:auto;}
.card-dim{font-family:var(--sans);font-size:11px;color:var(--ink-3);}
.card-price{font-family:var(--serif);font-size:15px;color:var(--ink);}
.card-add{border:1px dashed var(--line);border-radius:0;background:transparent;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;font-family:var(--sans);font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--ink-3);aspect-ratio:3/4;transition:all .3s var(--ease);}
.card-add:hover{border-color:var(--wood);color:var(--wood);background:color-mix(in srgb,var(--wood) 4%,transparent);}
.card-add .plus{font-size:28px;font-weight:300;line-height:1;}
.card-video{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;opacity:0;transition:opacity .4s cubic-bezier(.22,.61,.36,1);pointer-events:none;z-index:1;}
.card-media:hover .card-video{opacity:1;}
.card-video-badge{position:absolute;bottom:12px;left:12px;z-index:2;width:28px;height:28px;border-radius:50%;background:rgba(20,16,12,.55);backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .3s cubic-bezier(.22,.61,.36,1);}
.card-media:hover .card-video-badge{opacity:1;}
.card-video-badge svg{width:11px;height:11px;fill:white;margin-left:2px;}
.empty{grid-column:1/-1;text-align:center;padding:80px 20px;font-family:var(--serif);font-size:20px;color:var(--ink-3);}
/* GRID DE CATEGORÍAS */
.cat-section{margin-bottom:2px;}
.cat-grid{display:grid;grid-template-columns:repeat(3,1fr);grid-template-rows:280px 260px;gap:2px;}
.cat-card{position:relative;overflow:hidden;cursor:pointer;background:var(--ink);}
.cat-card:nth-child(4){grid-column:1/3;}
.cat-img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;display:block;transition:transform .6s var(--ease);}
.cat-card:hover .cat-img{transform:scale(1.04);}
.cat-ph{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;}
.cat-overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(20,16,12,.82) 0%,rgba(20,16,12,.28) 55%,rgba(20,16,12,.08) 100%);transition:opacity .4s var(--ease);}
.cat-card:hover .cat-overlay{opacity:.92;}
.cat-content{position:absolute;bottom:0;left:0;right:0;padding:clamp(16px,2.5vw,28px);}
.cat-name{font-family:var(--display);font-size:clamp(22px,2.4vw,34px);font-weight:400;font-style:italic;color:#fff;margin:0 0 5px;line-height:1.1;}
.cat-desc{font-family:var(--sans);font-size:12px;letter-spacing:.06em;color:rgba(255,255,255,.68);margin:0 0 14px;line-height:1.5;max-width:320px;}
.cat-btn{display:inline-flex;align-items:center;gap:7px;background:rgba(234,226,214,.92);color:var(--ink);font-family:var(--sans);font-size:10px;letter-spacing:.2em;text-transform:uppercase;padding:9px 18px;border-radius:999px;border:none;cursor:pointer;transition:background .25s var(--ease);}
.cat-btn:hover{background:#fff;}
.cat-active .cat-overlay{opacity:.92;}
.cat-active .cat-name{text-decoration:underline;text-underline-offset:4px;}
@media(max-width:600px){
  .cat-grid{grid-template-columns:repeat(2,1fr);grid-template-rows:220px 220px 220px;}
  .cat-card:nth-child(4){grid-column:auto;}
  .cat-card:nth-child(5){grid-column:1/-1;}
}
/* LOADING */
.loading-screen{position:fixed;inset:0;background:var(--paper);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;z-index:999;}
.loading-screen .mark{font-family:var(--display);font-size:28px;font-style:italic;color:var(--ink-2);}
.loading-bar{width:160px;height:2px;background:var(--line);border-radius:999px;overflow:hidden;}
.loading-bar-inner{height:100%;background:var(--wood);border-radius:999px;animation:loadPulse 1.2s var(--ease) infinite alternate;}
@keyframes loadPulse{from{width:20%;}to{width:100%;}}
/* DETALLE */
.detail{max-width:1300px;margin:0 auto;padding:clamp(24px,4vh,56px) clamp(18px,4vw,56px) 80px;}
.detail-back{background:none;border:none;cursor:pointer;font-family:var(--sans);font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--ink-3);display:inline-flex;align-items:center;gap:8px;padding:0 0 32px;transition:color .25s var(--ease);}
.detail-back:hover{color:var(--ink);}
.detail-back svg{width:16px;height:16px;}
.detail-card{background:var(--card);border-radius:24px;overflow:hidden;box-shadow:var(--shadow-lift);}
.detail-top{display:grid;grid-template-columns:1fr 1fr;gap:0;}
@media(max-width:768px){.detail-top{grid-template-columns:1fr;}}
.detail-gallery{background:var(--card-soft);padding:32px;}
.detail-hero{aspect-ratio:1;border-radius:12px;overflow:hidden;}
.detail-hero .ph{width:100%;height:100%;}
.detail-thumbs{display:flex;gap:8px;margin-top:12px;}
.detail-thumb{width:60px;height:60px;border-radius:8px;overflow:hidden;border:2px solid transparent;cursor:pointer;padding:0;background:none;transition:border-color .2s var(--ease);}
.detail-thumb.sel{border-color:var(--ink);}
.detail-thumb .ph{width:100%;height:100%;}
.detail-info{padding:clamp(28px,4vw,52px);}
.detail-eyebrow{display:flex;align-items:center;gap:12px;margin-bottom:12px;}
.detail-cat{font-family:var(--sans);font-size:10px;letter-spacing:.28em;text-transform:uppercase;color:var(--ink-3);}
.detail-name{font-family:var(--display);font-size:clamp(36px,4vw,58px);font-weight:400;font-style:italic;margin:0 0 6px;line-height:1.1;}
.detail-ref{font-family:var(--sans);font-size:11px;letter-spacing:.16em;color:var(--ink-3);margin-bottom:20px;}
.detail-desc{font-family:var(--serif);font-size:17px;line-height:1.75;color:var(--ink-2);margin-bottom:28px;}
.finish-block{margin-bottom:28px;}
.finish-label{font-family:var(--sans);font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--ink-3);margin-bottom:10px;}
.finish-label .name{color:var(--ink-2);font-style:italic;text-transform:none;}
.detail-specs{display:grid;grid-template-columns:1fr 1fr;gap:16px 24px;padding:24px 0;border-top:1px solid var(--line);border-bottom:1px solid var(--line);margin-bottom:24px;}
.spec-key{font-family:var(--sans);font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--ink-3);margin-bottom:4px;}
.spec-val{font-family:var(--serif);font-size:16px;color:var(--ink);}
.dim-list{display:grid;grid-template-columns:1fr auto;gap:6px 24px;align-items:baseline;margin-top:4px;}
.dim-k{font-family:var(--sans);font-size:12px;color:var(--ink-2);}
.dim-v{font-family:var(--serif);font-size:15px;color:var(--ink);text-align:right;}
.detail-priceblock{display:flex;align-items:center;gap:16px;flex-wrap:wrap;}
.detail-price{font-family:var(--display);font-size:clamp(28px,3vw,40px);}
.detail-price small{display:block;font-family:var(--sans);font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--ink-3);margin-bottom:2px;font-style:normal;}
.detail-pairing{padding:clamp(24px,4vw,48px);border-top:1px solid var(--line);}
.pairing-title{font-family:var(--sans);font-size:10px;letter-spacing:.3em;text-transform:uppercase;color:var(--ink-3);margin-bottom:20px;}
.pairing-row{display:flex;gap:16px;overflow-x:auto;padding-bottom:8px;}
.pairing-item{flex:0 0 140px;cursor:pointer;}
.pairing-item .ph{width:140px;height:140px;border-radius:10px;}
.pairing-cap{font-family:var(--display);font-size:15px;font-style:italic;margin-top:8px;color:var(--ink);}
/* DRAWER */
.scrim{position:fixed;inset:0;z-index:200;background:rgba(42,37,31,.5);backdrop-filter:blur(4px);}
.scrim.center{display:flex;align-items:center;justify-content:center;}
.drawer{position:absolute;top:0;right:0;bottom:0;width:min(560px,100vw);background:var(--paper);display:flex;flex-direction:column;box-shadow:-24px 0 60px rgba(42,37,31,.18);}
.drawer-head{padding:24px 28px 20px;border-bottom:1px solid var(--line);display:flex;align-items:flex-start;justify-content:space-between;gap:16px;}
.drawer-head h2{font-family:var(--display);font-size:28px;font-style:italic;margin:4px 0 0;font-weight:400;}
.drawer-body{flex:1;overflow-y:auto;padding:24px 28px;display:flex;flex-direction:column;gap:20px;}
.drawer-foot{padding:20px 28px;border-top:1px solid var(--line);display:flex;gap:12px;justify-content:flex-end;}
.field{display:flex;flex-direction:column;gap:6px;}
.field label{font-family:var(--sans);font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--ink-3);}
.field input,.field select,.field textarea{font-family:var(--sans);font-size:14px;color:var(--ink);background:var(--card);border:1px solid var(--line);border-radius:8px;padding:10px 14px;outline:none;transition:border-color .2s var(--ease);}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--ink);}
.field textarea{resize:vertical;min-height:80px;line-height:1.6;}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
.photo-drop{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;border:2px dashed var(--line);border-radius:12px;padding:24px;cursor:pointer;position:relative;transition:border-color .2s var(--ease);min-height:120px;overflow:hidden;}
.photo-drop:hover{border-color:var(--wood);}
.photo-drop img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;}
.photo-drop span{font-family:var(--sans);font-size:12px;color:var(--ink-3);}
.photo-x{position:absolute;top:8px;right:8px;background:rgba(42,37,31,.6);color:#fff;border-radius:50%;padding:4px;}
.photo-x:hover{background:var(--ink);color:var(--paper);}
.gallery-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(72px,1fr));gap:8px;margin-top:8px;}
.gallery-thumb{position:relative;border-radius:8px;overflow:hidden;aspect-ratio:1;background:var(--card-soft);border:1px solid var(--line);}
.gallery-thumb img{width:100%;height:100%;object-fit:cover;display:block;}
.gallery-thumb .photo-x{padding:3px;}
.gallery-add{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;border:2px dashed var(--line);border-radius:8px;aspect-ratio:1;cursor:pointer;transition:border-color .2s var(--ease);}
.gallery-add:hover{border-color:var(--wood);}
.gallery-add span{font-family:var(--sans);font-size:9px;color:var(--ink-3);text-align:center;line-height:1.3;}
.subhead{font-family:var(--sans);font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--ink-3);display:flex;align-items:center;justify-content:space-between;}
.mini-add{background:none;border:1px solid var(--line);border-radius:999px;padding:4px 10px;font-family:var(--sans);font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-3);cursor:pointer;display:inline-flex;align-items:center;gap:4px;transition:all .2s var(--ease);}
.mini-add:hover{border-color:var(--ink);color:var(--ink);}
.dim-edit,.finish-edit{display:flex;flex-direction:column;gap:8px;}
.dim-line,.finish-line{display:flex;gap:8px;align-items:center;}
.dim-line input{flex:1;}
.finish-line input[type=color]{width:36px;height:36px;padding:2px;border:1px solid var(--line);border-radius:6px;cursor:pointer;}
.finish-line input[type=text]{flex:1;}
.row-del{background:none;border:none;cursor:pointer;padding:6px;color:var(--ink-3);border-radius:6px;transition:all .2s;}
.row-del:hover{color:var(--st-descont);}
.seg{display:flex;gap:0;border:1px solid var(--line);border-radius:8px;overflow:hidden;}
.seg button{flex:1;background:none;border:none;padding:9px 8px;font-family:var(--sans);font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-3);cursor:pointer;border-right:1px solid var(--line);transition:all .2s var(--ease);}
.seg button:last-child{border-right:none;}
.seg button.on{background:var(--ink);color:var(--paper);}
.confirm{background:var(--card);border-radius:16px;padding:32px;max-width:400px;width:90vw;box-shadow:var(--shadow-lift);}
.confirm h3{font-family:var(--display);font-size:22px;font-style:italic;margin:0 0 10px;font-weight:400;}
.confirm p{font-family:var(--serif);font-size:16px;color:var(--ink-2);margin:0 0 24px;line-height:1.6;}
.confirm-actions{display:flex;gap:12px;justify-content:flex-end;}
/* SELECCIÓN */
.sel-bar{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);z-index:100;background:var(--ink);color:var(--paper);border-radius:999px;padding:14px 20px;display:flex;align-items:center;gap:16px;box-shadow:0 8px 32px rgba(42,37,31,.4);white-space:nowrap;}
.sel-x{background:none;border:none;cursor:pointer;color:rgba(234,226,214,.6);padding:0;display:inline-flex;transition:color .2s;}
.sel-x:hover{color:var(--paper);}
.sel-x svg{width:16px;height:16px;}
.sel-count{font-family:var(--sans);font-size:12px;letter-spacing:.12em;}
.sel-actions{display:flex;gap:8px;}
.sel-btn{font-family:var(--sans);font-size:11px;letter-spacing:.16em;text-transform:uppercase;padding:8px 16px;border-radius:999px;cursor:pointer;transition:all .2s var(--ease);}
.sel-btn.ghost{background:rgba(234,226,214,.12);border:1px solid rgba(234,226,214,.2);color:rgba(234,226,214,.7);}
.sel-btn.ghost:hover{background:rgba(234,226,214,.2);}
.sel-btn.ghost:disabled{opacity:.4;cursor:not-allowed;}
.sel-btn.solid{background:var(--paper);color:var(--ink);border:none;display:inline-flex;align-items:center;gap:8px;}
.sel-btn.solid:hover{background:var(--card);}
.sel-btn.solid:disabled{opacity:.4;cursor:not-allowed;}
.client-view{min-height:100vh;background:var(--paper);}
.client-ownerbar{background:var(--card);border-bottom:1px solid var(--line);padding:14px clamp(18px,4vw,56px);display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap;}
.client-owner-actions{display:flex;align-items:center;gap:12px;flex-wrap:wrap;}

  /* ---- Transformaciones de imagen del CDN de Supabase (plan Pro) ---- */
  function tUrl(url, w, q) {
    try {
      if (!url || typeof url !== "string") return url;
      if (url.startsWith("data:") || url.startsWith("blob:")) return url;
      if (url.indexOf("/storage/v1/object/public/") === -1) return url;
      const parts = url.split("?");
      const base = parts[0].replace("/storage/v1/object/public/", "/storage/v1/render/image/public/");
      let qs = "width=" + w + "&quality=" + (q || 75);
      if (parts[1]) qs += "&" + parts[1];

  async function compressImage(file, maxDim, quality) {
    maxDim = maxDim || 1600; quality = quality || 0.82;
    try {
      if (!file || !file.type || !file.type.startsWith("image/")) return file;
      if (file.type === "image/gif" || file.type === "image/svg+xml") return file;
      const bitmap = await createImageBitmap(file);
      const scale = Math.min(1, maxDim / Math.max(bitmap.width, bitmap.height));
      const w = Math.round(bitmap.width * scale);
      const h = Math.round(bitmap.height * scale);
      const canvas = document.createElement("canvas");
      canvas.width = w; canvas.height = h;
      canvas.getContext("2d").drawImage(bitmap, 0, 0, w, h);

    await Promise.allSettled(["jpg", "jpeg", "png", "webp"].map((e) =>
      supa.storage.from("catalogo-fotos").remove([`${itemId}.${e}`])
    ));
    const { error } = await supa.storage.from("catalogo-fotos").upload(path, file, {
      upsert: true, contentType: file.type,
    });
    if (error) { console.error("Error subiendo foto:", error); return null; }
    const { data } = supa.storage.from("catalogo-fotos").getPublicUrl(path);
    // Agregar timestamp para evitar caché
    return data.publicUrl + "?t=" + Date.now();
  }

  /* ---- Upload de foto de galería (path único, no sobrescribe nada) ---- */
  async function uploadGalleryPhoto(file, itemId) {
    file = await compressImage(file);
    const ext = file.name.split(".").pop();
    const unique = Date.now().toString(36) + "-" + Math.random().toString(36).slice(2, 6);
    const path = `${itemId}-gal-${unique}.${ext}`;
    const { error } = await supa.storage.from("catalogo-fotos").upload(path, file, {
      upsert: true, contentType: file.type,
    });
    if (error) { console.error("Error subiendo foto de galería:", error); return null; }
    const { data } = supa.storage.from("catalogo-fotos").getPublicUrl(path);
    return data.publicUrl;
  }

  /* ---- Borrar foto de galería de Storage a partir de su URL pública ---- */
  async function deleteGalleryPhoto(url) {
    if (!url) return;
    try {
      const fileName = url.split("/catalogo-fotos/")[1]?.split("?")[0];
      if (fileName) await supa.storage.from("catalogo-fotos").remove([decodeURIComponent(fileName)]);
    } catch (err) {
      console.error("Error borrando foto de galería:", err);
    }
  }

  function uid() {
    return "p-" + Date.now().toString(36) + "-" + Math.random().toString(36).slice(2, 6);
  }

  function blank(category) {
    const cat = category || CATEGORIES[0];
    return {
      id: uid(), name: "", category: cat, ref: "", price: "",
      status: "almacen", description: "", structure: "",
      finishes: [{ ...FINISH_PALETTE[0] }],
      dimensions: (DIM_SUGGEST[cat] || []).slice(0, 3).map(l => ({ label: l, value: "" })),
      photo: null, photo_url: null, gallery: [],
    };
  }

  /* ── Edge Function — token de administrador (se guarda en sessionStorage al hacer login) ── */
  const EDGE_URL = "https://pqpzhmopnigxyacwdjbc.supabase.co/functions/v1/catalogo-admin";

  function getAdminToken() {
    return sessionStorage.getItem("cd_admin_token") || "";
  }

  /* Llamada genérica a la Edge Function con el token admin */
  async function callAdmin(action, payload) {
    const token = getAdminToken();
    const res = await fetch(EDGE_URL, {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "x-admin-token": token,
      },
      body: JSON.stringify({ action, payload }),
    });
    const json = await res.json();
    if (!res.ok) throw new Error(json.error || "Error en Edge Function");
    return json.data;
  }

  /* Guardar / actualizar producto — ahora via Edge Function */
  async function saveItem(item) {
    const row = {
      id: item.id,
      name: item.name,
      category: item.category,
      ref: item.ref || "",
      price: item.price || "",
      status: item.status || "almacen",
      description: item.description || "",
      structure: item.structure || "",
      finishes: item.finishes || [],
      dimensions: item.dimensions || [],
      photo_url: item.photo_url || item.photo || null,
      gallery: item.gallery || [],
      hidden: item.hidden || false,
      video_url: item.video_url || null,
    };
    const data = await callAdmin("saveItem", row);
    return data ? mapRow(data) : null;
  }

  /* ---- Upload de video de producto a Storage ---- */
  async function uploadProductVideo(file, itemId) {
    const ext = (file.name.split(".").pop() || "mp4").toLowerCase();
    // Borrar cualquier versión previa del video de este producto (mp4, mov, webm)
    await Promise.allSettled(["mp4","mov","webm","avi"].map(e =>
      supa.storage.from("catalogo-fotos").remove([`${itemId}-video.${e}`])
    ));
    const path = `${itemId}-video.${ext}`;
    const { error } = await supa.storage.from("catalogo-fotos").upload(path, file, {
      upsert: true, contentType: file.type || "video/mp4",
    });
    if (error) { console.error("Error subiendo video de producto:", error); return null; }
    const { data } = supa.storage.from("catalogo-fotos").getPublicUrl(path);
    // Cache-bust para que no quede el video viejo en memoria
    return data.publicUrl + "?t=" + Date.now();
  }

  /* Eliminar producto — via Edge Function */
  async function deleteItem(id) {
    await callAdmin("deleteItem", { id });
  }

  /* Ocultar / mostrar producto — via Edge Function */
  async function toggleHidden(id, hidden) {
    await callAdmin("toggleHidden", { id, hidden });
  }

  /* Guardar configuración de portada — via Edge Function */
  async function saveSettings({ imageUrl }) {
    await callAdmin("saveSettings", { videoUrl: imageUrl, posterUrl: null });
    return true;
  }

  /* Subir imagen de portada a Storage */
  async function uploadCoverImage(file) {
    file = await compressImage(file);
    const ext = (file.name.split(".").pop() || "jpg").toLowerCase();
    const path = `_portada/cover.${ext}`;
    await supa.storage.from("catalogo-fotos").remove([path]);
    const { error } = await supa.storage.from("catalogo-fotos").upload(path, file, {
      upsert: true, contentType: file.type || "image/jpeg",
    });
    if (error) { console.error("Error subiendo imagen de portada:", error); return null; }
    const { data } = supa.storage.from("catalogo-fotos").getPublicUrl(path);
    return data.publicUrl + "?t=" + Date.now();
  }

  /* Borrar foto de galería de Storage */
  async function deleteGalleryPhoto(url) {
    if (!url) return;
    try {
      const fileName = url.split("/catalogo-fotos/")[1]?.split("?")[0];
      if (fileName) {
        // Intentar via Edge Function primero; si falla, directo
        try {
          await callAdmin("deleteStorageFile", { bucket: "catalogo-fotos", path: decodeURIComponent(fileName) });
        } catch {
          await supa.storage.from("catalogo-fotos").remove([decodeURIComponent(fileName)]);
        }
      }
    } catch (err) {
      console.error("Error borrando foto de galería:", err);
    }
  }

  /* ---- Guardar lead de captación y enviar a Brevo ---- */
  async function saveLead({ nombre, whatsapp, correo, aceptaWhatsapp }) {
    const wa = whatsapp.trim().replace(/\D/g, ""); // solo dígitos
    // 1. Guardar en Supabase tabla leads_catalogo
    const { error } = await supa.from("leads_catalogo").insert({
      nombre: nombre.trim(),
      whatsapp: wa,
      acepta_whatsapp: !!aceptaWhatsapp,
      correo: correo.trim().toLowerCase(),
      origen: "catalogo_web",
      created_at: new Date().toISOString(),
    });
    if (error) { console.error("Error guardando lead:", error); throw error; }

    // 2. Agregar contacto a Brevo via proxy Vercel
    try {
      await fetch("/api/brevo", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          email: correo.trim().toLowerCase(),
          attributes: { NOMBRE: nombre.trim(), WHATSAPP: wa, ACEPTA_WA: !!aceptaWhatsapp },
          listIds: [2],
          updateEnabled: true,
        }),
      });
    } catch (e) {
      console.warn("Brevo no disponible:", e);
    }
  }

  /* ---- Cargar fotos de portada de categorías (__cat_Nombrecat__) ---- */
  async function loadCatPhotos() {
    const ids = CATEGORIES.map((c) => `__cat_${c}__`);
    const { data, error } = await supa
      .from("catalogo_productos")
      .select("id, photo_url")
      .in("id", ids);
    if (error || !data) return {};
    const map = {};
    data.forEach((r) => {
      const cat = r.id.replace("__cat_", "").replace("__", "");
      if (r.photo_url) map[cat] = r.photo_url;
    });
    return map;
  }

  /* ---- Guardar foto de portada de una categoría ---- */
  async function saveCatPhoto(cat, photoUrl) {
    const id = `__cat_${cat}__`;
    await callAdmin("saveItem", {
      id,
      name: `__portada_${cat}`,
      category: cat,
      ref: "",
      price: "",
      status: "almacen",
      description: "",
      structure: "",
      finishes: [],
      dimensions: [],
      photo_url: photoUrl,
      gallery: [],
      hidden: false,
      video_url: null,
    });
  }

  /* ---- Upload de foto de portada de categoría ---- */
  async function uploadCatPhoto(file, cat) {
    file = await compressImage(file);
    const ext = (file.name.split(".").pop() || "jpg").toLowerCase();
    const path = `_cat-covers/${cat.toLowerCase()}.${ext}`;
    // Borrar versiones previas
    await Promise.allSettled(["jpg","jpeg","png","webp"].map((e) =>
      supa.storage.from("catalogo-fotos").remove([`_cat-covers/${cat.toLowerCase()}.${e}`])
    ));
    const { error } = await supa.storage.from("catalogo-fotos").upload(path, file, {
      upsert: true, contentType: file.type || "image/jpeg",
    });
    if (error) { console.error("Error subiendo foto de categoría:", error); return null; }
    const { data } = supa.storage.from("catalogo-fotos").getPublicUrl(path);
    return data.publicUrl + "?t=" + Date.now();
  }

  window.CASA = {
    CATEGORIES, STATUS, FINISH_PALETTE, DIM_SUGGEST, tUrl,
    load, saveItem, deleteItem, toggleHidden, uploadPhoto, uid, blank,
    loadSettings, saveSettings, uploadCoverImage, uploadProductVideo,
    uploadGalleryPhoto, deleteGalleryPhoto,
    registerView, loadStats, saveLead,
    loadCatPhotos, saveCatPhoto, uploadCatPhoto,
    logoUrl: LOGO_URL,
    getAdminToken,
    SEED, mapRow,
  };
})();

const Img = ({ src, label = "Foto del mueble", className = "", eager = false, w = 0, q = 0, fit = "cover" }) => {
  const ref = React.useRef(null);
  const optimized = w && src ? window.CASA.tUrl(src, w, q || 75) : src;
  const [current, setCurrent] = React.useState(optimized);
  React.useEffect(() => { setCurrent(optimized); }, [optimized]);
  React.useEffect(() => {
    const img = ref.current;
    if (!img) return;
    if (img.complete) { img.classList.add("loaded"); img.parentElement && img.parentElement.classList.add("loaded"); }
    else { img.onload = () => { img.classList.add("loaded"); img.parentElement && img.parentElement.classList.add("loaded"); }; }
  }, [current]);
  const handleError = () => {
    // Si la transformación falla (ej: originales > 25 MB), volver a la URL original
    if (current !== src && src) setCurrent(src);
  };
  const bg = fit === "blur" && src ? window.CASA.tUrl(src, 200, 40) : null;
  return (
    <div className={"ph " + (src ? "has-img " : "") + (fit === "blur" ? "ph-blur " : "") + className} data-label={label}>
      {bg ? <img className="ph-bg" src={bg} alt="" aria-hidden="true" loading={eager ? "eager" : "lazy"} decoding="async" /> : null}
      {src ? <img ref={ref} className={fit === "blur" ? "ph-fg" : ""} src={current} alt={label} loading={eager ? "eager" : "lazy"} decoding="async" onError={handleError} /> : null}
    </div>
  );
};

      {widths.map((w, i) => <i key={i} style={{ width: w + "px", opacity: (i % 7 === 0 ? .4 : .95) }} />)}

function useReveal(dep) {
  React.useEffect(() => {
    const els = Array.from(document.querySelectorAll(".reveal:not(.in)"));
    const io = new IntersectionObserver((entries) => {
      entries.forEach((e) => { if (e.isIntersecting) { e.target.classList.add("in"); io.unobserve(e.target); } });
    }, { threshold: 0.12, rootMargin: "0px 0px -40px 0px" });
    els.forEach((el) => io.observe(el));
    const fallback = setTimeout(() => { document.querySelectorAll(".reveal:not(.in)").forEach((el) => el.classList.add("in")); }, 300);
    return () => { io.disconnect(); clearTimeout(fallback); };
  }, [dep]);
}

const CategoryGrid = ({ items, filter, setFilter, admin, catPhotos, setCatPhotos }) => {
  const CATS = window.CASA.CATEGORIES;
  const gridRef = React.useRef(null);
  const [uploading, setUploading] = React.useState(null); // cat name being uploaded
  const fileInputRef = React.useRef(null);
  const [pendingCat, setPendingCat] = React.useState(null);

  /* Foto de portada: primero la foto personalizada de la cat, si no la primera del catálogo */
  const catPhoto = (cat) => {
    if (catPhotos && catPhotos[cat]) return catPhotos[cat];
    const found = items.find((it) => (it.category === cat) && (it.photo || it.photo_url) && !it.hidden);
    return found ? (found.photo_url || found.photo) : null;
  };

  const handleCat = (cat) => {
    setFilter(cat === filter ? "Todo" : cat);
    setTimeout(() => {
      const grid = document.querySelector(".grid");
      if (grid) grid.scrollIntoView({ behavior: "smooth", block: "start" });
    }, 60);
  };

  const handlePhotoBtn = (e, cat) => {
    e.stopPropagation();
    setPendingCat(cat);
    fileInputRef.current.value = "";
    fileInputRef.current.click();
  };

  const handleFileChange = async (e) => {
    const file = e.target.files[0];
    if (!file || !pendingCat) return;
    setUploading(pendingCat);
    try {
      const url = await CASA.uploadCatPhoto(file, pendingCat);
      if (url) {
        await CASA.saveCatPhoto(pendingCat, url);
        setCatPhotos((prev) => ({ ...prev, [pendingCat]: url }));
      }
    } catch (err) {
      console.error("Error al cambiar foto de categoría:", err);
    }
    setUploading(null);
    setPendingCat(null);
  };

  return (
    <div className="cat-section">
      {/* Input oculto para subir foto */}
      <input
        ref={fileInputRef}
        type="file"
        accept="image/*"
        style={{ display: "none" }}
        onChange={handleFileChange}
      />
      <div className="cat-grid" ref={gridRef}>
        {CATS.map((cat, i) => {
          const photo = catPhoto(cat);
          const isActive = filter === cat;
          const isUploading = uploading === cat;
          const hasCustomPhoto = catPhotos && catPhotos[cat];
          return (
            <div
              key={cat}
              className={"cat-card" + (isActive ? " cat-active" : "")}
              onClick={() => handleCat(cat)}
            >
              {photo
                ? <img className="cat-img" src={window.CASA.tUrl(photo, 1000)} alt={cat} loading="lazy" decoding="async" onError={(e) => { if (e.currentTarget.src !== photo) e.currentTarget.src = photo; }} />
                : <div className="cat-ph" style={{ color: "var(--ink-2)" }}>{CAT_ICONS[cat]}</div>
              }
              <div className="cat-overlay" />
              <div className="cat-content">
                <div className="cat-name">{cat}</div>
                <div className="cat-desc">{CAT_DESCS[cat] || ""}</div>
                <button className="cat-btn" tabIndex={-1}>
                  {isActive ? "Viendo esta categoría" : "Ver categoría"} →
                </button>
              </div>
              {/* Botón de editar foto — solo visible en modo admin */}
              {admin && (
                <button
                  className="cat-photo-edit-btn"
                  title={hasCustomPhoto ? "Cambiar foto de portada" : "Subir foto de portada"}
                  onClick={(e) => handlePhotoBtn(e, cat)}
                  disabled={isUploading}
                  style={{
                    position: "absolute",
                    top: 10,
                    right: 10,
                    zIndex: 10,
                    background: isUploading ? "rgba(0,0,0,0.5)" : "rgba(255,255,255,0.92)",
                    border: "none",
                    borderRadius: "50%",
                    width: 36,
                    height: 36,
                    display: "flex",
                    alignItems: "center",
                    justifyContent: "center",
                    cursor: isUploading ? "wait" : "pointer",
                    boxShadow: "0 2px 8px rgba(0,0,0,0.18)",
                    color: isUploading ? "#fff" : "var(--wood)",
                    transition: "all .2s",
                  }}
                >
                  {isUploading
                    ? <Icon name="spinner" width={18} height={18} style={{ animation: "spin 1s linear infinite" }} />
                    : <Icon name="image" width={18} height={18} />
                  }
                </button>
              )}
            </div>
          );
        })}
      </div>
    </div>
  );
};

const Catalog = ({ items, admin, selecting, selected, onToggleSelect, filter, setFilter, query, setQuery, onOpen, onAdd, onEdit, onToggleHide, onDelete, catPhotos, setCatPhotos }) => {
  const CATS = window.CASA.CATEGORIES;

      const q = query.toLowerCase();

            <div className="kicker">Colección · 2026</div>
            <h1>El <em>catálogo</em></h1>

          <div className="catalog-count">
            {visible.length} {visible.length === 1 ? "pieza" : "piezas"}
            {filter !== "Todo" && <span style={{ color: "var(--wood)" }}> · {filter}</span>}
            {admin && !selecting && <span style={{ color: "var(--ink-3)" }}> · modo edición</span>}
            {selecting && <span style={{ color: "var(--wood)" }}> · elige para tu cliente</span>}
          </div>
        </div>
        <div className="toolbar">
          <div className="chips">
            <button className={"chip" + (filter === "Todo" ? " on" : "")} onClick={() => setFilter("Todo")}>Todo</button>
            {CATS.map((c) => (
              <button key={c} className={"chip" + (filter === c ? " on" : "")} onClick={() => setFilter(c)}>{c}</button>
            ))}
          </div>
          <div className="search">
            <Icon name="search" />
            <input value={query} onChange={(e) => setQuery(e.target.value)} placeholder="Buscar pieza, referencia…" />
          </div>
        </div>
        <div className="grid">
          {admin && !selecting && (
            <button className="card-add" onClick={onAdd}>
              <span className="plus">+</span>Agregar mueble
            </button>
          )}
          {visible.map((it, i) => (
            <ProductCard key={it.id} item={it} index={i} admin={admin} selecting={selecting}
              isSelected={selSet.has(it.id)} onToggleSelect={onToggleSelect}
              onOpen={onOpen} onEdit={onEdit} onToggleHide={onToggleHide} onDelete={onDelete} />
          ))}
          {visible.length === 0 && !admin && <div className="empty">No hay piezas en esta categoría por ahora.</div>}
        </div>
      </div>
    </div>
  );
};

Object.assign(window, { Catalog, ProductCard, useReveal });
</script>

<script type="text/babel" data-presets="react-classic">
const Lightbox = ({ images, index, label, onClose, onNav }) => {
  React.useEffect(() => {
    const onKey = (e) => {
      if (e.key === "Escape") onClose();
      if (e.key === "ArrowRight") onNav(1);
      if (e.key === "ArrowLeft") onNav(-1);
    };
    window.addEventListener("keydown", onKey);
    return () => window.removeEventListener("keydown", onKey);
  }, [onClose, onNav]);
  React.useEffect(() => {
    const prevOverflow = document.body.style.overflow;
    const prevPosition = document.body.style.position;
    const prevTop = document.body.style.top;
    const prevWidth = document.body.style.width;
    const scrollY = window.scrollY;
    document.body.style.overflow = "hidden";
    document.body.style.position = "fixed";
    document.body.style.top = -scrollY + "px";
    document.body.style.width = "100%";
    return () => {
      document.body.style.overflow = prevOverflow;
      document.body.style.position = prevPosition;
      document.body.style.top = prevTop;
      document.body.style.width = prevWidth;
      window.scrollTo(0, scrollY);
    };
  }, []);
  const multi = images.length > 1;
  const touchRef = React.useRef({ x: 0, y: 0, active: false });
  const onTouchStart = (e) => {
    const t = e.touches[0];
    touchRef.current = { x: t.clientX, y: t.clientY, active: true };
  };
  const onTouchEnd = (e) => {
    if (!touchRef.current.active || !multi) return;
    touchRef.current.active = false;
    const t = e.changedTouches[0];
    const dx = t.clientX - touchRef.current.x;
    const dy = t.clientY - touchRef.current.y;
    if (Math.abs(dx) > 50 && Math.abs(dx) > Math.abs(dy)) {
      onNav(dx < 0 ? 1 : -1);
    }
  };
  return (
    <div className="lightbox" onClick={onClose}>
      <div className="lightbox-inner" onClick={(e) => e.stopPropagation()} onTouchStart={onTouchStart} onTouchEnd={onTouchEnd}>
        <button className="lightbox-close" onClick={onClose} title="Cerrar"><Icon name="x" /></button>
        {multi && <button className="lightbox-nav prev" onClick={() => onNav(-1)}><Icon name="arrowL" /></button>}
        <img className="lightbox-img" src={window.CASA.tUrl(images[index], 1600, 80)} alt={label} onError={(e) => { if (e.currentTarget.src !== images[index]) e.currentTarget.src = images[index]; }} />
        {multi && <button className="lightbox-nav next" onClick={() => onNav(1)}><Icon name="arrowR" /></button>}
        {label && <div className="lightbox-cap">{label}</div>}
      </div>
    </div>
  );
};

const Detail = ({ item, related, onBack, onOpen, onShare }) => {
  const [fin, setFin] = React.useState(0);
  const [activeImg, setActiveImg] = React.useState(0);
  const [lightbox, setLightbox] = React.useState(false);
  React.useEffect(() => { setFin(0); setActiveImg(0); setLightbox(false); window.scrollTo({ top: 0 }); }, [item.id]);
  if (!item) return null;
  const gallery = [item.photo || item.photo_url, ...(item.gallery || [])];
  if (gallery.length === 0) gallery.push(null);
  const hasVideo = !!item.video_url;
  const views = ["Frontal", "3/4", "Lateral", "Posterior"];
  const finishName = item.finishes && item.finishes[fin] ? item.finishes[fin].name : "—";
  const realImages = gallery.filter(Boolean);
  // activeImg === gallery.length es el índice especial del video
  const isVideoActive = hasVideo && activeImg === gallery.length;
  const canZoom = !isVideoActive && !!gallery[activeImg];
  const openLightbox = () => { if (canZoom) setLightbox(true); };
  const navLightbox = (dir) => setLightbox((prev) => {
    const base = typeof prev === "number" ? prev : Math.max(0, realImages.indexOf(gallery[activeImg]));
    return (base + dir + realImages.length) % realImages.length;
  });
  const lbIndex = lightbox === true ? Math.max(0, realImages.indexOf(gallery[activeImg])) : lightbox;
  return (
    <div className="detail view-enter">
      <button className="detail-back" onClick={onBack}><Icon name="arrowL" /> Volver al catálogo</button>
      <div className="detail-card">
        <div className="detail-top">
          <div className="detail-gallery">
            <div className="detail-hero" onClick={!isVideoActive ? openLightbox : undefined} style={{ cursor: canZoom ? "zoom-in" : "default", position: "relative" }}>
              {isVideoActive ? (
                <video
                  key={item.video_url}
                  src={item.video_url}
                  style={{ width: "100%", height: "100%", objectFit: "cover", display: "block", borderRadius: 4 }}
                  controls autoPlay muted playsInline loop
                />
              ) : (
                <>
                  <Img key={activeImg} src={gallery[activeImg]} label={item.category + " · " + (views[activeImg] || "Vista")} eager w={1400} />
                  {canZoom && <span className="zoom-hint"><Icon name="zoom" /></span>}
                </>
              )}
            </div>
            <div className="detail-thumbs">
              {views.map((v, i) => (
                <button key={i} className={"detail-thumb" + (i === activeImg && !isVideoActive ? " sel" : "")} onClick={() => setActiveImg(i)}>
                  <Img src={gallery[i] || null} label="" w={220} />
                </button>
              ))}
              {hasVideo && (
                <button
                  className={"detail-thumb" + (isVideoActive ? " sel" : "")}
                  onClick={() => setActiveImg(gallery.length)}
                  title="Ver video de ambientación"
                  style={{ position: "relative", overflow: "hidden" }}
                >
                  <video src={item.video_url} style={{ width: "100%", height: "100%", objectFit: "cover", pointerEvents: "none" }} muted playsInline preload="metadata" />
                  <div style={{
                    position: "absolute", inset: 0, display: "flex", alignItems: "center", justifyContent: "center",
                    background: "rgba(20,16,12,.38)", backdropFilter: "blur(1px)",
                  }}>
                    <svg viewBox="0 0 24 24" fill="white" width="22" height="22" style={{ filter: "drop-shadow(0 2px 4px rgba(0,0,0,.6))" }}>
                      <polygon points="5,3 19,12 5,21" />
                    </svg>
                  </div>
                </button>
              )}
            </div>
          </div>
          <div className="detail-info">
            <div className="detail-eyebrow">
              <span className="detail-cat">{item.category}</span>
              <StatusBadge status={item.status} />
            </div>
            <h1 className="detail-name">{item.name}</h1>
            {item.ref && <div className="detail-ref">Ref. {item.ref}</div>}
            <p className="detail-desc">{item.description}</p>
            {item.finishes && item.finishes.length > 0 && (
              <div className="finish-block">
                <div className="finish-label">Acabados disponibles <span className="name">— {finishName}</span></div>
                <FinishDots finishes={item.finishes} selected={fin} onSelect={setFin} />
              </div>
            )}
            <div className="detail-specs">
              <div><div className="spec-key">Categoría</div><div className="spec-val">{item.category}</div></div>
              <div><div className="spec-key">Estructura</div><div className="spec-val">{item.structure || "—"}</div></div>
              <div><div className="spec-key">Acabado</div><div className="spec-val">{finishName}</div></div>
              <div style={{ gridColumn: "1 / -1" }}>
                <div className="spec-key">Medidas</div>
                <div className="dim-list">
                  {item.dimensions && item.dimensions.length
                    ? item.dimensions.map((d, i) => (
                        <React.Fragment key={i}>
                          <span className="dim-k">{d.label}</span>
                          <span className="dim-v">{d.value}</span>
                        </React.Fragment>
                      ))
                    : <span className="dim-k">—</span>}
                </div>
              </div>
            </div>
            <div className="detail-priceblock">
              {item.price && <div className="detail-price"><small>Desde</small>{item.price}</div>}
              <button className="btn ghost small" onClick={onShare} style={{ marginLeft: "auto" }}>
                <Icon name="share" /> Compartir
              </button>
            </div>
            <a className="wa-btn block detail-wa-inline" href={waLink(waPieceMessage(item))} target="_blank" rel="noopener noreferrer"
               style={{ marginTop: 22 }}>
              <WAIcon /> Comunícate con un asesor
            </a>
          </div>
        </div>
        {related && related.length > 0 && (
          <div className="detail-pairing">
            <div className="pairing-title">También combina con</div>
            <div className="pairing-row">
              {related.map((r) => (
                <div key={r.id} className="pairing-item" onClick={() => onOpen(r)}>
                  <Img src={r.photo || r.photo_url} label={r.category} />
                  <div className="pairing-cap">{r.name}</div>
                </div>
              ))}
            </div>
          </div>
        )}
      </div>
      {lightbox !== false && realImages.length > 0 && (
        <Lightbox images={realImages} index={lbIndex}
          label={item.name + (item.ref ? " · Ref. " + item.ref : "")}
          onClose={() => setLightbox(false)} onNav={navLightbox} />
      )}
    </div>
  );
};
Object.assign(window, { Detail, Lightbox });
</script>
