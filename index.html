<!-- Modal de autenticación admin -->
<script type="text/babel" data-presets="react-classic">
/* SHA-256 simple hash para verificar la contraseña sin exponerla en texto plano */
const AdminAuth = ({ onSuccess, onClose }) => {
  const [pwd, setPwd] = React.useState("");
  const [show, setShow] = React.useState(false);
  const [err, setErr] = React.useState(false);
  const [busy, setBusy] = React.useState(false);

  /* La verificación vive SOLO en la Edge Function — ningún hash queda expuesto en el frontend.
     Se manda la contraseña por HTTPS; la Edge la hashea y compara contra su variable de entorno. */
  const attempt = async () => {
    if (!pwd.trim()) return;
    setBusy(true); setErr(false);
    try {
      const EDGE_URL = "https://pqpzhmopnigxyacwdjbc.supabase.co/functions/v1/catalogo-admin";
      const res = await fetch(EDGE_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json", "x-admin-token": pwd },
        body: JSON.stringify({ action: "verifyAdmin", payload: {} }),
      });
      if (res.ok) {
        sessionStorage.setItem("cd_admin_ok", "1");
        sessionStorage.setItem("cd_admin_token", pwd);
        onSuccess();
      } else {
        setErr(true); setPwd("");
      }
    } catch (e) {
      setErr(true); setPwd("");
    }
    setBusy(false);
  };

  const onKey = (e) => { if (e.key === "Enter") attempt(); if (e.key === "Escape") onClose(); };
  const logoSrc = window.CASA.logoUrl || null;

  return (
    <div className="auth-overlay" onClick={onClose}>
      <div className="auth-box" onClick={e => e.stopPropagation()}>
        <button className="auth-close" onClick={onClose} title="Cancelar">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M18 6 6 18M6 6l12 12"/></svg>
        </button>
        {logoSrc && <div className="auth-box-logo"><img src={logoSrc} alt="Casa DAMS" /></div>}
        <h2>Modo edición</h2>
        <p>Acceso restringido</p>
        <div className="auth-field">
          <input
            type={show ? "text" : "password"}
            placeholder="Contraseña"
            value={pwd}
            onChange={e => { setPwd(e.target.value); setErr(false); }}
            onKeyDown={onKey}
            className={err ? "error" : ""}
            autoFocus
          />
          <button className="auth-eye" type="button" onClick={() => setShow(s => !s)} tabIndex={-1}>
            {show
              ? <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
              : <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            }
          </button>
        </div>
        {err && (
          <div className="auth-err">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" style={{width:13,height:13}}><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
            Contraseña incorrecta
          </div>
        )}
        <button className="auth-btn" onClick={attempt} disabled={busy || !pwd.trim()}>
          {busy ? "Verificando…" : "Ingresar"}
        </button>
      </div>
    </div>
  );
};
Object.assign(window, { AdminAuth });
</script>

<!-- Editor admin -->
<script type="text/babel" data-presets="react-classic">
const Editor = ({ initial, onClose, onSave, onUploadPhoto }) => {
  const CASA = window.CASA;
  const [d, setD] = React.useState(() => JSON.parse(JSON.stringify(initial)));
  const [uploading, setUploading] = React.useState(false);
  const [galleryUploading, setGalleryUploading] = React.useState(false);
  const [videoUploading, setVideoUploading] = React.useState(false);

  const set = (k, v) => setD((p) => ({ ...p, [k]: v }));
  const setDim = (i, k, v) => setD((p) => { const dims = p.dimensions.slice(); dims[i] = { ...dims[i], [k]: v }; return { ...p, dimensions: dims }; });
  const addDim = () => setD((p) => ({ ...p, dimensions: [...p.dimensions, { label: "", value: "" }] }));
  const delDim = (i) => setD((p) => ({ ...p, dimensions: p.dimensions.filter((_, j) => j !== i) }));
  const setFin = (i, k, v) => setD((p) => { const fs = p.finishes.slice(); fs[i] = { ...fs[i], [k]: v }; return { ...p, finishes: fs }; });
  const addFin = () => setD((p) => ({ ...p, finishes: [...p.finishes, { name: "Nuevo", color: "#A99A82" }] }));
  const delFin = (i) => setD((p) => ({ ...p, finishes: p.finishes.filter((_, j) => j !== i) }));

  /* Foto: sube directo a Supabase Storage */
  const onPhoto = async (e) => {
    const file = e.target.files && e.target.files[0];
    if (!file) return;
    setUploading(true);
    try {
      const url = await CASA.uploadPhoto(file, d.id);
      if (url) { set("photo_url", url); set("photo", url); }
    } catch (err) {
      console.error("Fallo subiendo foto:", err);
      alert("No se pudo subir la foto, intenta de nuevo");
    }
    setUploading(false);
  };

  /* Galería: agrega una o varias fotos adicionales sin reemplazar la principal */
  const onGalleryAdd = async (e) => {
    const files = e.target.files ? Array.from(e.target.files) : [];
    if (files.length === 0) return;
    setGalleryUploading(true);
    const uploaded = [];
    for (const file of files) {
      try {
        const url = await CASA.uploadGalleryPhoto(file, d.id);
        if (url) uploaded.push(url);
      } catch (err) {
        console.error("Fallo subiendo foto de galería:", err);
      }
    }
    if (uploaded.length > 0) {
      setD((p) => ({ ...p, gallery: [...(p.gallery || []), ...uploaded] }));
    }
    if (uploaded.length < files.length) {
      alert("Algunas fotos no se pudieron subir, intenta de nuevo con esas.");
    }
    setGalleryUploading(false);
    e.target.value = "";
  };

  const onGalleryRemove = (idx) => {
    setD((p) => {
      const removed = p.gallery[idx];
      // Borrado en Storage en segundo plano; no bloquea la edición
      CASA.deleteGalleryPhoto(removed);
      return { ...p, gallery: p.gallery.filter((_, j) => j !== idx) };
    });
  };


  const onProductVideo = async (e) => {
    const file = e.target.files?.[0];
    if (!file) return;
    setVideoUploading(true);
    try {
      const url = await CASA.uploadProductVideo(file, d.id);
      if (url) set("video_url", url);
    } catch (err) {
      console.error("Fallo subiendo video:", err);
      alert("No se pudo subir el video, intenta de nuevo");
    }
    setVideoUploading(false);
    e.target.value = "";
  };
  const onCategory = (cat) => {
    setD((p) => {
      const empty = p.dimensions.every((x) => !x.label && !x.value);
      const dims = empty ? (CASA.DIM_SUGGEST[cat] || []).slice(0, 3).map((l) => ({ label: l, value: "" })) : p.dimensions;
      return { ...p, category: cat, dimensions: dims };
    });
  };

  const valid = d.name.trim().length > 0;
  const photoSrc = d.photo_url || d.photo;

  return (
    <div className="scrim" onMouseDown={(e) => { if (e.target === e.currentTarget) onClose(); }}>
      <div className="drawer" onMouseDown={(e) => e.stopPropagation()}>
        <div className="drawer-head">
          <div>
            <div className="kicker">{initial.name ? "Editar pieza" : "Nueva pieza"}</div>
            <h2>{d.name || "Sin nombre"}</h2>
          </div>
          <button className="icon-btn" onClick={onClose} title="Cerrar"><Icon name="x" /></button>
        </div>
        <div className="drawer-body">
          <div className="field">
            <label>Fotografía</label>
            <label className="photo-drop">
              {uploading
                ? <><Icon name="spinner" style={{ width: 24, height: 24, animation: "spin 1s linear infinite" }} /><span>Subiendo foto…</span></>
                : photoSrc
                  ? <img src={photoSrc} alt="" />
                  : <><Icon name="image" style={{ width: 26, height: 26 }} /><span>Subir foto (fondo blanco)</span></>
              }
              <input type="file" accept="image/*" onChange={onPhoto} style={{ display: "none" }} disabled={uploading} />
              {photoSrc && !uploading && (
                <button className="icon-btn photo-x" onClick={(e) => { e.preventDefault(); set("photo", null); set("photo_url", null); }} title="Quitar">
                  <Icon name="x" />
                </button>
              )}
            </label>
          </div>
          <div className="field">
            <label>Fotos adicionales (galería)</label>
            <div className="gallery-grid">
              {(d.gallery || []).map((url, i) => (
                <div className="gallery-thumb" key={i}>
                  <img src={url} alt="" />
                  <button className="icon-btn photo-x" onClick={(e) => { e.preventDefault(); onGalleryRemove(i); }} title="Quitar">
                    <Icon name="x" />
                  </button>
                </div>
              ))}
              <label className="gallery-add">
                {galleryUploading
                  ? <Icon name="spinner" style={{ width: 18, height: 18, animation: "spin 1s linear infinite" }} />
                  : <><Icon name="image" style={{ width: 18, height: 18 }} /><span>Agregar</span></>
                }
                <input type="file" accept="image/*" multiple onChange={onGalleryAdd} style={{ display: "none" }} disabled={galleryUploading} />
              </label>
            </div>
          </div>
          <div className="field">
            <label>Video de ambientación</label>
            {d.video_url ? (
              <div style={{ position: "relative", borderRadius: 10, overflow: "hidden", background: "var(--card-soft)", border: "1px solid var(--line)" }}>
                <video src={d.video_url} style={{ width: "100%", maxHeight: 180, display: "block", objectFit: "cover" }} controls muted playsInline />
                <button className="icon-btn photo-x" style={{ position: "absolute", top: 8, right: 8, background: "rgba(42,37,31,.55)", color: "#fff", borderRadius: "50%" }}
                  onClick={(e) => { e.preventDefault(); set("video_url", null); }} title="Quitar video">
                  <Icon name="x" />
                </button>
              </div>
            ) : (
              <label className="photo-drop" style={{ minHeight: 80 }}>
                {videoUploading
                  ? <><Icon name="spinner" style={{ width: 22, height: 22, animation: "spin 1s linear infinite" }} /><span>Subiendo video…</span></>
                  : <><Icon name="image" style={{ width: 22, height: 22 }} /><span>Subir video (máx. recomendado: 50 MB · mp4)</span></>
                }
                <input type="file" accept="video/*" onChange={onProductVideo} style={{ display: "none" }} disabled={videoUploading} />
              </label>
            )}
          </div>
          <div className="field">
            <label>Nombre de la pieza</label>
            <input value={d.name} onChange={(e) => set("name", e.target.value)} placeholder="Ej. Toscana" autoFocus />
          </div>
          <div className="field-row">
            <div className="field">
              <label>Categoría</label>
              <select value={d.category} onChange={(e) => onCategory(e.target.value)}>
                {CASA.CATEGORIES.map((c) => <option key={c} value={c}>{c}</option>)}
              </select>
            </div>
            <div className="field">
              <label>Referencia</label>
              <input value={d.ref} onChange={(e) => set("ref", e.target.value)} placeholder="DS-COM-014" />
            </div>
          </div>
          <div className="field-row">
            <div className="field">
              <label>Precio</label>
              <input value={d.price} onChange={(e) => set("price", e.target.value)} placeholder="$4.890.000" />
            </div>
            <div className="field">
              <label>Estructura / material</label>
              <input value={d.structure} onChange={(e) => set("structure", e.target.value)} placeholder="Roble macizo · bouclé" />
            </div>
          </div>
          <div className="field">
            <label>Disponibilidad</label>
            <div className="seg">
              {Object.entries(CASA.STATUS).map(([key, s]) => (
                <button key={key} className={d.status === key ? "on" : ""} onClick={() => set("status", key)}>{s.label}</button>
              ))}
            </div>
          </div>
          <div className="field">
            <label>Descripción</label>
            <textarea value={d.description} onChange={(e) => set("description", e.target.value)} placeholder="Una frase elegante sobre la pieza…" />
          </div>
          <div className="field">
            <div className="subhead">
              Medidas
              <button className="mini-add" onClick={addDim}><Icon name="plus" style={{ width: 13, height: 13 }} /> Agregar</button>
            </div>
            <div className="dim-edit">
              {d.dimensions.map((dim, i) => (
                <div className="dim-line" key={i}>
                  <input value={dim.label} onChange={(e) => setDim(i, "label", e.target.value)} placeholder="Ej. Mesa — largo" />
                  <input value={dim.value} onChange={(e) => setDim(i, "value", e.target.value)} placeholder="2.00 m" />
                  <button className="row-del" onClick={() => delDim(i)} title="Quitar"><Icon name="trash" style={{ width: 15, height: 15 }} /></button>
                </div>
              ))}
              {d.dimensions.length === 0 && <div style={{ color: "var(--ink-3)", fontFamily: "var(--serif)", fontSize: 15 }}>Sin medidas.</div>}
            </div>
          </div>
          <div className="field">
            <div className="subhead">
              Acabados disponibles
              <button className="mini-add" onClick={addFin}><Icon name="plus" style={{ width: 13, height: 13 }} /> Agregar</button>
            </div>
            <div className="finish-edit">
              {d.finishes.map((f, i) => (
                <div className="finish-line" key={i}>
                  <input type="color" value={f.color} onChange={(e) => setFin(i, "color", e.target.value)} />
                  <input type="text" value={f.name} onChange={(e) => setFin(i, "name", e.target.value)} placeholder="Nombre del acabado" />
                  <button className="row-del" onClick={() => delFin(i)} title="Quitar"><Icon name="trash" style={{ width: 15, height: 15 }} /></button>
                </div>
              ))}
            </div>
          </div>
        </div>
        <div className="drawer-foot">
          <button className="btn ghost" onClick={onClose}>Cancelar</button>
          <button className="btn" disabled={!valid || uploading} style={{ opacity: valid && !uploading ? 1 : .45 }} onClick={() => onSave(d)}>
            <Icon name="check" /> Guardar pieza
          </button>
        </div>
      </div>
    </div>
  );
};

const Confirm = ({ title, message, onCancel, onConfirm }) => (
  <div className="scrim center" onMouseDown={(e) => { if (e.target === e.currentTarget) onCancel(); }}>
    <div className="confirm" onMouseDown={(e) => e.stopPropagation()}>
      <h3>{title}</h3>
      <p>{message}</p>
      <div className="confirm-actions">
        <button className="btn ghost" onClick={onCancel}>Cancelar</button>
        <button className="btn" onClick={onConfirm} style={{ background: "var(--st-descont)", borderColor: "var(--st-descont)" }}>Eliminar</button>
      </div>
    </div>
  </div>
);

Object.assign(window, { Editor, Confirm });
</script>

        <div className="kicker" style={{ marginTop: 16 }}>Selección personalizada</div>

      </div>

};

const Stats = ({ onBack }) => {
  const [rows, setRows] = React.useState(null);
  const [error, setError] = React.useState(false);
  React.useEffect(() => {
    CASA.loadStats()
      .then((data) => setRows(data))
      .catch(() => setError(true));
  }, []);
  const totalVistas = rows ? rows.reduce((sum, r) => sum + (r.total_vistas || 0), 0) : 0;
  const porCategoria = React.useMemo(() => {
    if (!rows) return [];
    const map = {};
    rows.forEach((r) => {
      const cat = r.categoria || "Sin categoría";
      map[cat] = (map[cat] || 0) + (r.total_vistas || 0);
    });
    return Object.entries(map).sort((a, b) => b[1] - a[1]);
  }, [rows]);
  return (
    <div className="detail view-enter">
      <button className="detail-back" onClick={onBack}><Icon name="arrowL" /> Volver</button>
      <div className="detail-card" style={{ padding: "28px clamp(20px,4vw,40px) 40px" }}>
        <h1 className="cover-headline" style={{ marginBottom: 6 }}>Estadísticas del catálogo</h1>
        <p style={{ fontFamily: "var(--sans)", fontSize: 13, color: "var(--ink-3)", marginBottom: 28 }}>
          Cada vez que un cliente abre el detalle de una pieza, se cuenta como una vista. Las vistas tuyas en modo edición no se cuentan.
        </p>

        {error && <div className="empty">No se pudieron cargar las estadísticas. Verifica tu conexión.</div>}

        {!error && rows === null && (
          <div className="empty"><Icon name="spinner" style={{ width: 22, height: 22, animation: "spin 1s linear infinite" }} /></div>
        )}

        {rows !== null && rows.length === 0 && (
          <div className="empty">Todavía no hay vistas registradas. Aparecerán aquí cuando los clientes empiecen a ver productos.</div>
        )}

        {rows !== null && rows.length > 0 && (
          <>
            <div style={{ display: "flex", gap: 16, marginBottom: 32, flexWrap: "wrap" }}>
              <div style={{ flex: "1 1 160px", border: "1px solid var(--line)", borderRadius: 12, padding: "18px 20px" }}>
                <div className="spec-key">Total de vistas</div>
                <div style={{ fontFamily: "var(--display)", fontSize: 32, fontStyle: "italic", marginTop: 4 }}>{totalVistas}</div>
              </div>
              <div style={{ flex: "1 1 160px", border: "1px solid var(--line)", borderRadius: 12, padding: "18px 20px" }}>
                <div className="spec-key">Piezas con al menos 1 vista</div>
                <div style={{ fontFamily: "var(--display)", fontSize: 32, fontStyle: "italic", marginTop: 4 }}>{rows.length}</div>
              </div>
            </div>

            <div className="subhead" style={{ marginBottom: 14 }}>Vistas por categoría</div>
            <div style={{ marginBottom: 32 }}>
              {porCategoria.map(([cat, n]) => (
                <div key={cat} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "10px 0", borderBottom: "1px solid var(--line)", fontFamily: "var(--sans)", fontSize: 13 }}>
                  <span>{cat}</span>
                  <span style={{ color: "var(--ink-3)" }}>{n} {n === 1 ? "vista" : "vistas"}</span>
                </div>
              ))}
            </div>

            <div className="subhead" style={{ marginBottom: 14 }}>Piezas más vistas</div>
            <div>
              {rows.slice(0, 30).map((r, i) => (
                <div key={r.producto_id} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "10px 0", borderBottom: "1px solid var(--line)", fontFamily: "var(--sans)", fontSize: 13 }}>
                  <span style={{ display: "flex", gap: 10, alignItems: "baseline" }}>
                    <span style={{ color: "var(--ink-3)", fontSize: 11, minWidth: 18 }}>{i + 1}.</span>
                    <span>{r.nombre || "Sin nombre"}</span>
                    <span style={{ color: "var(--ink-3)", fontSize: 11 }}>{r.categoria}</span>
                  </span>
                  <span style={{ fontWeight: 500 }}>{r.total_vistas} {r.total_vistas === 1 ? "vista" : "vistas"}</span>
                </div>
              ))}
            </div>
          </>
        )}
      </div>
    </div>
  );
};

Object.assign(window, { SelectionBar, ClientView, Stats });
</script>

<!-- LeadModal — Captación de contactos para promociones -->
<script type="text/babel" data-presets="react-classic">
function LeadModal({ onClose }) {
  const [nombre, setNombre]     = React.useState("");
  const [whatsapp, setWhatsapp] = React.useState("");
  const [correo, setCorreo]     = React.useState("");
  const [acepta, setAcepta]     = React.useState(false);
  const [aceptaWa, setAceptaWa] = React.useState(false);
  const [sending, setSending]   = React.useState(false);
  const [done, setDone]         = React.useState(false);
  const [err, setErr]           = React.useState("");

  const valid = nombre.trim().length > 1
    && correo.includes("@")
    && acepta;

  async function handleSubmit() {
    if (!valid || sending) return;
    setSending(true);
    setErr("");
    try {
      await window.CASA.saveLead({ nombre, whatsapp, correo, aceptaWhatsapp: aceptaWa });
      setDone(true);
    } catch(e) {
      setErr("Hubo un error. Intenta de nuevo.");
    } finally {
      setSending(false);
    }
  }

  return (
    <div className="lead-overlay" onClick={e => e.target === e.currentTarget && onClose()}>
      <div className="lead-box">
        {done ? (
          <div className="lead-success-body">
            <div className="lead-success-icon">🛋️</div>
            <h3>¡Ya estás dentro!</h3>
            <p>Recibirás nuestras mejores ofertas y novedades en tu correo. Gracias por tu interés en Casa DAMS.</p>
            <button className="lead-submit" onClick={onClose}>Explorar el catálogo</button>
          </div>
        ) : (
          <>
            <div className="lead-box-hero">
              <button className="lead-close" onClick={onClose}><Icon name="x" /></button>
              <p className="kicker">Oferta exclusiva</p>
              <div className="lead-box-discount">Primero<br/><em>en saberlo</em></div>
              <p className="lead-box-subtitle">Novedades · Descuentos · Lanzamientos</p>
            </div>
            <div className="lead-box-body">
              <p className="lead-box-desc">Regístrate y sé el primero en conocer nuestras promociones y nuevas colecciones.</p>
              <div className="lead-fields">
                <div className="lead-field">
                  <input
                    type="text"
                    placeholder="Nombre completo"
                    value={nombre}
                    onChange={e => setNombre(e.target.value)}
                  />
                </div>
                <div className="lead-field">
                  <input
                    type="tel"
                    placeholder="Tu WhatsApp (ej: 3215400000)"
                    value={whatsapp}
                    onChange={e => setWhatsapp(e.target.value)}
                  />
                </div>
                <div className="lead-field">
                  <input
                    type="email"
                    placeholder="Correo electrónico"
                    value={correo}
                    onChange={e => setCorreo(e.target.value)}
                  />
                </div>
              </div>
              <div className="lead-privacy">
                <input
                  type="checkbox"
                  id="lead-acepta"
                  checked={acepta}
                  onChange={e => setAcepta(e.target.checked)}
                />
                <span>Autorizo a Casa DAMS a tratar mis datos personales (nombre y correo) para enviarme promociones y novedades. Puedo revocar esta autorización en cualquier momento escribiendo a nuestro WhatsApp. (Ley 1581 de 2012 — Política de tratamiento de datos)</span>
              </div>
              <div className="lead-privacy">
                <input
                  type="checkbox"
                  id="lead-acepta-wa"
                  checked={aceptaWa}
                  onChange={e => setAceptaWa(e.target.checked)}
                />
                <span>Autorizo también el envío de mensajes promocionales por WhatsApp al número que indiqué.</span>
              </div>
              {err && <div className="lead-err">{err}</div>}
              <button className="lead-submit" disabled={!valid || sending} onClick={handleSubmit}>
                {sending ? "Enviando…" : "¡Quiero estar al día!"}
              </button>
              <button className="lead-skip" onClick={onClose}>No me interesa, gracias.</button>
            </div>
          </>
        )}
      </div>
    </div>
  );
}
Object.assign(window, { LeadModal });
</script>

<!-- App root -->
<script type="text/babel" data-presets="react-classic">
const { useState, useEffect, useCallback } = React;

function App() {
  const CASA = window.CASA;
  const [items, setItems] = useState([]);
  const [loading, setLoading] = useState(true);
  const [view, setView] = useState(window.innerWidth <= 600 ? "catalog" : "cover");
  const [current, setCurrent] = useState(null);
  const [detailReturn, setDetailReturn] = useState("catalog");
  const [admin, setAdmin] = useState(false);
  const [showAuth, setShowAuth] = useState(false);
  const [showLead, setShowLead] = useState(false);

  // Auto-popup de captación — aparece a los 8s si no lo ha visto en los últimos 7 días
  React.useEffect(() => {
    const last = localStorage.getItem("cd_lead_shown");
    const SEVEN_DAYS = 7 * 24 * 60 * 60 * 1000;
    if (last && Date.now() - parseInt(last) < SEVEN_DAYS) return;
    const t = setTimeout(() => {
      setShowLead(true);
      localStorage.setItem("cd_lead_shown", Date.now().toString());
    }, 8000);
    return () => clearTimeout(t);
  }, []);
  const logoTaps = React.useRef({ count: 0, timer: null });
  const [filter, setFilter] = useState("Todo");
  const [query, setQuery] = useState("");
  const [editing, setEditing] = useState(null);
  const [confirm, setConfirm] = useState(null);
  const [toast, setToast] = useState(null);
  const [selecting, setSelecting] = useState(false);
  const [selected, setSelected] = useState([]);
  const [clientOwner, setClientOwner] = useState(true);
  const [cover, setCover] = useState({ imageUrl: null });
  const [coverUploading, setCoverUploading] = useState(false);
  const [catPhotos, setCatPhotos] = useState({});
  const DEFAULT_NOTE = "Estas son las piezas que elegimos para tu espacio. Toca cualquiera para ver medidas, acabados y todos los detalles.";
  const [clientNote, setClientNote] = useState(DEFAULT_NOTE);

  /* Cargar desde Supabase al iniciar */
  useEffect(() => {
    CASA.load()
      .then((data) => { setItems(data); setLoading(false); })
      .catch((err) => {
        console.error("Fallo de red cargando catálogo:", err);
        setItems(CASA.SEED.map(CASA.mapRow));
        setLoading(false);
      });
    CASA.loadSettings().then((s) => setCover(s)).catch(() => {});
    CASA.loadCatPhotos().then((p) => setCatPhotos(p)).catch(() => {});
  }, []);

  /* Reportar cada cambio de sección a Google Analytics, ya que el catálogo es una sola página */
  useEffect(() => {
    if (typeof window.gtag !== "function") return;
    const pagePaths = {
      cover: "/portada",
      catalog: "/catalogo",
      client: "/seleccion-cliente",
      stats: "/estadisticas",
      detail: current ? "/producto/" + (current.id || "") : "/producto",
    };
    const pageTitle = view === "detail" && current ? "Producto: " + (current.name || "") : "Casa DAMS — " + view;
    window.gtag("event", "page_view", {
      page_path: pagePaths[view] || "/" + view,
      page_title: pageTitle,
      page_location: window.location.href,
    });
  }, [view, current]);

  const onPickCoverImage = async (e) => {
    const file = e.target.files && e.target.files[0];
    if (!file) return;
    if (file.size > 20 * 1024 * 1024) { flash("La imagen es muy pesada (máx. 20 MB)"); return; }
    setCoverUploading(true);
    const url = await CASA.uploadCoverImage(file);
    if (url) {
      const next = { imageUrl: url };
      setCover(next);
      await CASA.saveSettings(next);
      flash("Imagen de portada actualizada");
    } else {
      flash("No se pudo subir la imagen — intenta de nuevo");
    }
    setCoverUploading(false);
  };

  /* Hash para selección de cliente o producto directo */
  useEffect(() => {
    const h = window.location.hash || "";
    if (h.indexOf("seleccion=") !== -1) {
      const params = new URLSearchParams(h.slice(1));
      const ids = (params.get("seleccion") || "").split(",").filter(Boolean);
      const n = params.get("n");
      if (ids.length) {
        setSelected(ids);
        if (n) { try { setClientNote(decodeURIComponent(n)); } catch (e) {} }
        setClientOwner(false);
        setView("client");
      }
    } else if (h.indexOf("producto=") !== -1) {
      const params = new URLSearchParams(h.slice(1));
      const pid = params.get("producto");
      if (pid && items.length > 0) {
        const found = items.find((p) => p.id === pid && !p.hidden);
        if (found) { setCurrent(found); setDetailReturn("catalog"); setView("detail"); }
      }
    }
  }, [items]);

  const flash = useCallback((msg) => {
    setToast(msg); clearTimeout(flash._t);
    flash._t = setTimeout(() => setToast(null), 2200);
  }, []);

  const openProduct = (item, from) => {
    setCurrent(item); setDetailReturn(from || "catalog"); setView("detail");
    if (!admin && item && item.id) CASA.registerView(item.id, item.name, item.category);
  };
  const goCatalog = () => setView("catalog");
  const goCover = () => setView("cover");
  const goStats = () => setView("stats");

  const startSelecting = () => { setAdmin(false); setView("catalog"); setSelecting(true); };
  const cancelSelecting = () => setSelecting(false);
  const toggleSelect = (item) => {
    setSelected((prev) => prev.includes(item.id) ? prev.filter((x) => x !== item.id) : [...prev, item.id]);
  };
  const clearSelection = () => setSelected([]);

  const buildClientLink = () => {
    const base = window.location.origin + window.location.pathname;
    const n = clientNote && clientNote !== DEFAULT_NOTE ? "&n=" + encodeURIComponent(clientNote) : "";
    return base + "#seleccion=" + selected.join(",") + n;
  };

  const createClientView = () => {
    if (!selected.length) return;
    setClientOwner(true); setSelecting(false); setView("client");
    try { window.location.hash = "seleccion=" + selected.join(","); } catch (e) {}
    window.scrollTo({ top: 0 });
  };

  const copyClientLink = () => {
    const link = buildClientLink();
    if (navigator.clipboard) navigator.clipboard.writeText(link).catch(() => {});
    flash("Enlace copiado — pégalo en WhatsApp");
  };

  const exitClientView = () => {
    setView("catalog"); setSelecting(true);
    try { history.replaceState(null, "", window.location.pathname); } catch (e) {}
  };

  const editSelection = () => { setView("catalog"); setSelecting(true); window.scrollTo({ top: 0 }); };

  /* CRUD con Supabase */
  const openAdd = () => setEditing(CASA.blank(filter !== "Todo" ? filter : undefined));
  const openEdit = (item) => setEditing(item);

  const saveItem = async (data) => {
    const saved = await CASA.saveItem(data);
    if (!saved) { flash("Error guardando — intenta de nuevo"); return; }
    setItems((prev) => {
      const exists = prev.some((p) => p.id === saved.id);
      return exists ? prev.map((p) => (p.id === saved.id ? saved : p)) : [saved, ...prev];
    });
    setCurrent((c) => (c && c.id === saved.id ? saved : c));
    setEditing(null);
    flash(items.some((p) => p.id === data.id) ? "Pieza actualizada" : "Pieza agregada");
  };

  const toggleHide = async (item) => {
    await CASA.toggleHidden(item.id, !item.hidden);
    setItems((prev) => prev.map((p) => (p.id === item.id ? { ...p, hidden: !p.hidden } : p)));
    flash(item.hidden ? "Pieza visible" : "Pieza oculta");
  };

  const askDelete = (item) => setConfirm(item);
  const doDelete = async () => {
    const item = confirm;
    await CASA.deleteItem(item.id);
    setItems((prev) => prev.filter((p) => p.id !== item.id));
    if (current && current.id === item.id) goCatalog();
    setConfirm(null);
    flash("Pieza eliminada");
  };

  const shareProduct = () => {
    const base = window.location.origin + window.location.pathname;
    const url = base + "#producto=" + (current ? current.id : "");
    const title = current ? current.name + " — Casa DAMS" : "Casa DAMS";
    const text = current ? "Mirá este mueble en el catálogo de Casa DAMS: " + current.name : "Catálogo Casa DAMS";
    if (navigator.share) {
      navigator.share({ title, text, url }).catch(() => {});
    } else if (navigator.clipboard) {
      navigator.clipboard.writeText(url).catch(() => {});
      flash("Enlace copiado");
    }
  };

  const related = current
    ? items.filter((p) => p.id !== current.id && !p.hidden).sort((a, b) => (a.category === current.category ? -1 : 1)).slice(0, 4)
    : [];

  if (loading) {
    return (
      <div className="loading-screen">
        <div className="mark">Casa <em>DAMS</em></div>
        <div className="loading-bar"><div className="loading-bar-inner"></div></div>
      </div>
    );
  }

  return (
    <div className="app">
      {view !== "client" && (
        <header className="topbar">
          <div className="brand" onClick={(e) => {
              // 5 taps en el logo activan el modal de admin
              const t = logoTaps.current;
              if (e.target.closest(".brand-logo")) {
                clearTimeout(t.timer);
                t.count += 1;
                if (t.count >= 5) {
                  t.count = 0;
                  if (admin) { setAdmin(false); } else { setShowAuth(true); }
                } else {
                  t.timer = setTimeout(() => { t.count = 0; }, 1800);
                }
                return;
              }
              goCover();
            }}>
            <span className="brand-logo"><img src={window.CASA.logoUrl} alt="Casa DAMS" /></span>
            <span className="mark">Casa <em>DAMS</em></span>
            <span className="sub">Mobiliario</span>
          </div>
          <nav className="top-nav">
            <button className={"top-link top-link-portada" + (view === "cover" ? " active" : "")} onClick={goCover}>Portada</button>
            <button className={"top-link" + (view !== "cover" && view !== "client" && view !== "stats" ? " active" : "")} onClick={() => { setSelecting(false); goCatalog(); }}>Catálogo</button>
            {admin && !selecting && view !== "client" && (
              <button className="top-link" onClick={startSelecting}>Selección</button>
            )}
            {admin && (
              <button className={"top-link" + (view === "stats" ? " active" : "")} onClick={goStats}>Estadísticas</button>
            )}
            {admin && (
              <button className={"admin-toggle on"} onClick={() => { setAdmin(false); setSelecting(false); sessionStorage.removeItem("cd_admin_ok"); sessionStorage.removeItem("cd_admin_token"); }}>
                <Icon name="unlock" />
                Modo edición
              </button>
            )}
          </nav>
        </header>
      )}

      {view === "cover" && (
        <Cover onEnter={goCatalog}
          heroSrc={items.find((i) => i.photo || i.photo_url)?.photo || items.find((i) => i.photo || i.photo_url)?.photo_url || null}
          imageSrc={cover.imageUrl}
          admin={admin} uploading={coverUploading} onPickImage={onPickCoverImage} />
      )}

      {view === "catalog" && (
        <>
          <Catalog items={items} admin={admin} selecting={selecting} selected={selected}
            onToggleSelect={toggleSelect} filter={filter} setFilter={setFilter}
            query={query} setQuery={setQuery} onOpen={openProduct}
            onAdd={openAdd} onEdit={openEdit} onToggleHide={toggleHide} onDelete={askDelete}
            catPhotos={catPhotos} setCatPhotos={setCatPhotos} />
          {!selecting && <footer className="foot"><div className="mark">Casa DAMS</div><div className="web">Mobiliario · Diseño contemporáneo</div></footer>}
        </>
      )}

      {view === "stats" && admin && <Stats onBack={goCatalog} />}

      {view === "client" && (
        <ClientView items={items} ids={selected} note={clientNote} owner={clientOwner}
          onSetNote={setClientNote} onOpen={(it) => openProduct(it, "client")}
          onExit={exitClientView} onCopyLink={copyClientLink} onEditSelection={editSelection} />
      )}

      {view === "detail" && current && (
        <>
          <Detail item={current} related={related}
            onBack={() => { setView(detailReturn); window.scrollTo({ top: 0 }); }}
            onOpen={(it) => openProduct(it, detailReturn)} onShare={shareProduct} />
          {admin && (
            <div style={{ textAlign: "center", paddingBottom: 60 }}>
              <button className="btn ghost" onClick={() => openEdit(current)}><Icon name="edit" /> Editar esta pieza</button>
            </div>
          )}
          <footer className="foot"><div className="mark">Casa DAMS</div><div className="web">Mobiliario · Diseño contemporáneo</div></footer>
        </>
      )}

      {editing && <Editor initial={editing} onClose={() => setEditing(null)} onSave={saveItem} />}
      {confirm && (
        <Confirm title="¿Eliminar pieza?"
          message={`"${confirm.name}" se quitará del catálogo permanentemente. Si solo quieres esconderla, usa el ojo.`}
          onCancel={() => setConfirm(null)} onConfirm={doDelete} />
      )}
      {selecting && view === "catalog" && (
        <SelectionBar count={selected.length} onClear={clearSelection} onCreate={createClientView} onCancel={cancelSelecting} />
      )}
      {((view === "catalog" && !selecting) || view === "detail") && (
        <a className="wa-float" href={waLink("Hola, Casa DAMS. Estoy viendo el catálogo y me gustaría más información.")}
           target="_blank" rel="noopener noreferrer" title="Escríbenos por WhatsApp" aria-label="WhatsApp">
          <WAIcon />
        </a>
      )}
      {showLead && <LeadModal onClose={() => setShowLead(false)} />}
      {((view === "catalog" && !selecting) || view === "detail") && !showLead && (
        <button className="lead-tab" onClick={() => setShowLead(true)} aria-label="Ver ofertas">
          <span className="lead-tab-txt">Ofertas</span>
        </button>
      )}
      {toast && <div className="toast"><Icon name="check" style={{ width: 15, height: 15 }} />{toast}</div>}
      {showAuth && (
        <AdminAuth
          onSuccess={() => { setShowAuth(false); setAdmin(true); }}
          onClose={() => setShowAuth(false)}
        />
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>

@keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
</style>
